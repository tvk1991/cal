<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Máy tính kiểm tra kết quả</title>
    <style>
        /* (Giữ nguyên toàn bộ CSS từ file gốc) */
        html, body {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #2b3a4a 0%, #1d2a35 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 0;
            touch-action: manipulation;
        }

        .calculator {
            width: 100%;
            max-width: 340px;
            background: #1f2a34;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.1);
            padding: 10px 8px 14px;
            margin: 4px;
            will-change: transform;
            -webkit-touch-callout: none;
            user-select: none;
            display: flex;
            flex-direction: column;
            max-height: 98vh;
            overflow: hidden;
        }

        .display-area {
            background: #1e282f;
            border-radius: 24px;
            padding: 8px 8px 6px;
            margin-bottom: 8px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.6), 0 2px 5px rgba(255,255,255,0.05);
            border: 1px solid #3a4a55;
            flex-shrink: 0;
        }

        .main-screen {
            background: #121b22;
            border-radius: 16px;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
            border: 1px solid #3e5a68;
            margin-bottom: 6px;
        }

        #display {
            font-size: 1.8rem;
            font-weight: 300;
            color: #b0e0ff;
            text-shadow: 0 0 12px #4aa3ff;
            letter-spacing: 1px;
            flex: 1;
            text-align: right;
            font-family: 'Courier New', monospace;
            transition: text-shadow 0.1s ease;
            min-height: 2.2rem;
            max-height: 4rem;
            overflow-y: auto;
            word-break: break-all;
            white-space: pre-wrap;
            line-height: 1.2;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        #display::-webkit-scrollbar {
            display: none;
        }

        .backspace-btn {
            background: transparent;
            border: none;
            color: #a0c0d0;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0 4px;
            transition: opacity 0.1s, transform 0.1s;
            line-height: 1;
            text-shadow: 0 0 8px #4aa3ff;
            opacity: 0.8;
            min-width: 40px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .backspace-btn:active {
            opacity: 1;
            transform: scale(1.1);
            color: #ffaa00;
        }

        .target-row {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #121b22;
            border-radius: 14px;
            padding: 4px 8px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
            border: 1px solid #3e5a68;
            cursor: pointer; /* Thêm cursor pointer để người dùng biết có thể nhấn */
        }

        .target-label {
            color: #aabbcc;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            opacity: 0.8;
            white-space: nowrap;
            pointer-events: none;
        }

        #targetInput {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 1.4rem;
            font-weight: 300;
            color: #ffde9e;
            text-shadow: 0 0 10px #ffb347;
            text-align: right;
            font-family: 'Courier New', monospace;
            outline: none;
            padding: 4px 0;
            min-width: 0;
            -webkit-user-select: text;
            user-select: text;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
            transition: all 0.2s ease;
            /* Chặn bàn phím bằng readonly */
            readonly: readonly;
        }
        #targetInput::-webkit-outer-spin-button,
        #targetInput::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        #targetInput::placeholder {
            color: #3f5563;
            font-size: 1.1rem;
            text-shadow: none;
        }

        #targetInput.editing-mode {
            background: #1e3a4a;
            border-radius: 12px;
            box-shadow: 0 0 0 3px #ffaa00;
            animation: targetPulse 1.5s infinite;
            cursor: default;
        }

        @keyframes targetPulse {
            0% { box-shadow: 0 0 0 3px #ffaa00; }
            50% { box-shadow: 0 0 0 6px #ffaa00; }
            100% { box-shadow: 0 0 0 3px #ffaa00; }
        }

        .message-area {
            margin-top: 4px;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            padding: 4px 6px;
            border-radius: 40px;
            background: #1a262e;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            color: #ddd;
            transition: background 0.2s, color 0.2s, box-shadow 0.2s;
            border: 1px solid #3f5563;
            min-height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            will-change: background, box-shadow;
        }

        .message-area.success {
            background: #1f4a3a;
            color: #b0ffc0;
            text-shadow: 0 0 10px #36d96b;
            border-color: #58b87a;
            box-shadow: 0 0 20px #2ecc71;
        }

        .message-area.error {
            background: #5a2e3a;
            color: #ffb0b0;
            text-shadow: 0 0 10px #ff4f4f;
            border-color: #c45a5a;
            box-shadow: 0 0 20px #e74c3c;
        }

        .message-area.vibrate {
            animation: vibrate 0.3s ease-in-out;
        }

        @keyframes vibrate {
            0% { transform: translateX(0); filter: brightness(1); }
            20% { transform: translateX(4px); filter: brightness(1.3); }
            40% { transform: translateX(-4px); filter: brightness(0.9); }
            60% { transform: translateX(2px); filter: brightness(1.2); }
            80% { transform: translateX(-2px); filter: brightness(0.95); }
            100% { transform: translateX(0); filter: brightness(1); }
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            margin-top: 4px;
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
        }

        .btn {
            border: none;
            background: #2c3e4c;
            border-radius: 20px;
            padding: 8px 2px;
            font-size: 1.8rem;
            font-weight: 500;
            color: #eef5f9;
            box-shadow: 0 4px 0 #15232b, 0 6px 10px rgba(0,0,0,0.4);
            cursor: default;
            transition: transform 0.05s linear, box-shadow 0.05s linear, background 0.05s;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #4a6572;
            text-shadow: 0 2px 3px black;
            min-height: 78px;
            touch-action: manipulation;
            will-change: transform, box-shadow;
            -webkit-tap-highlight-color: transparent;
            pointer-events: auto;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #15232b, 0 3px 6px rgba(0,0,0,0.4);
            background: #3a5264;
        }

        .btn.led-flash {
            background: #ffd966;
            color: #1a1a1a;
            text-shadow: none;
            box-shadow: 0 0 25px #ffee88;
            transition: none;
        }

        .btn.operator {
            background: #f09b3c;
            border-color: #ffb45e;
            color: #1e2b33;
            text-shadow: 0 1px 2px white;
        }

        .btn.operator:active {
            background: #ffb259;
        }

        .btn.clear {
            background: #5f4c4c;
            border-color: #9b7a7a;
            color: #ffe1c6;
        }

        .btn.equals {
            background: #3d8f6f;
            border-color: #6fc9a3;
            font-weight: 700;
        }

        .btn.zero {
            grid-column: span 2;
        }

        .btn.plus-long {
            grid-row: span 2;
            min-height: 160px;
        }

        /* Media queries */
        @media (max-width: 340px) {
            .calculator {
                max-width: 100%;
                padding: 6px 4px 10px;
                border-radius: 30px;
                margin: 2px;
            }
            .btn {
                padding: 4px 1px;
                font-size: 1.5rem;
                min-height: 60px;
                border-radius: 16px;
            }
            .btn.plus-long {
                min-height: 124px;
            }
            #display {
                font-size: 1.6rem;
                min-height: 1.9rem;
            }
            #targetInput {
                font-size: 1.2rem;
            }
            .target-label {
                font-size: 0.7rem;
            }
            .message-area {
                font-size: 0.8rem;
                padding: 3px 4px;
                min-height: 1.7rem;
            }
            .backspace-btn {
                font-size: 1.3rem;
                min-width: 36px;
                min-height: 36px;
            }
        }

        @media (min-width: 341px) and (max-width: 380px) {
            .calculator {
                max-width: 95%;
                padding: 8px 6px 12px;
            }
            .btn {
                font-size: 1.7rem;
                min-height: 70px;
            }
            .btn.plus-long {
                min-height: 144px;
            }
            #display {
                font-size: 1.8rem;
            }
        }

        @media (min-width: 381px) and (max-width: 450px) {
            .calculator {
                max-width: 380px;
                padding: 12px 10px 16px;
            }
            .btn {
                font-size: 2rem;
                min-height: 85px;
            }
            .btn.plus-long {
                min-height: 174px;
            }
            #display {
                font-size: 2.2rem;
                min-height: 2.8rem;
            }
            #targetInput {
                font-size: 1.8rem;
            }
            .target-label {
                font-size: 0.9rem;
            }
            .message-area {
                font-size: 1rem;
                min-height: 2.2rem;
            }
        }

        @media (min-width: 451px) and (max-width: 599px) {
            .calculator {
                max-width: 420px;
                padding: 15px 12px 20px;
                border-radius: 50px;
            }
            .btn {
                font-size: 2.2rem;
                min-height: 95px;
                border-radius: 25px;
            }
            .btn.plus-long {
                min-height: 194px;
            }
            #display {
                font-size: 2.5rem;
                min-height: 3.2rem;
            }
            #targetInput {
                font-size: 2rem;
            }
            .target-label {
                font-size: 1rem;
            }
            .message-area {
                font-size: 1.1rem;
                min-height: 2.5rem;
                padding: 6px 10px;
            }
            .backspace-btn {
                font-size: 1.8rem;
                min-width: 50px;
                min-height: 50px;
            }
        }

        @media (min-width: 600px) and (max-width: 800px) {
            .calculator {
                max-width: 500px;
                padding: 20px 15px 25px;
            }
            .btn {
                font-size: 2.5rem;
                min-height: 110px;
            }
            .btn.plus-long {
                min-height: 224px;
            }
        }

        @media (min-width: 801px) {
            .calculator {
                max-width: 550px;
                padding: 25px 20px 30px;
                border-radius: 60px;
            }
            .btn {
                font-size: 2.8rem;
                min-height: 120px;
                border-radius: 30px;
            }
            .btn.plus-long {
                min-height: 244px;
            }
            #display {
                font-size: 3rem;
                min-height: 3.8rem;
            }
            #targetInput {
                font-size: 2.5rem;
            }
        }

        /* Hỗ trợ iPhone với notch/dynamic island */
        @supports (padding: max(0px)) {
            .calculator {
                padding-left: max(8px, env(safe-area-inset-left));
                padding-right: max(8px, env(safe-area-inset-right));
                padding-bottom: max(14px, env(safe-area-inset-bottom));
            }
        }

        /* Tối ưu cho màn hình OLED Samsung */
        @media (display-mode: browser) {
            .calculator {
                background: #1a242e;
            }
        }

        /* Đảm bảo không bị tràn */
        * {
            box-sizing: border-box;
            -webkit-box-sizing: border-box;
        }

        /* Indicator */
        .editing-indicator {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffaa00;
            color: #1a1a1a;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 170, 0, 0.5);
            z-index: 1000;
            animation: slideDown 0.3s ease;
            display: none;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -100%); }
            to { transform: translate(-50%, 0); }
        }

        .editing-indicator.show {
            display: block;
        }

        @media (max-width: 340px) {
            .editing-indicator {
                font-size: 0.8rem;
                padding: 6px 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Phần HTML giữ nguyên -->
    <div class="calculator">
        <div class="display-area">
            <div class="main-screen">
                <div id="display">0</div>
                <button class="backspace-btn" id="backspaceBtn" tabindex="-1">⌫</button>
            </div>
            <div class="target-row">
                <span class="target-label">Số Kiểm Tra</span>
                <input type="text" id="targetInput" placeholder="0" inputmode="none" readonly>
            </div>
            <div class="message-area" id="messageBox"></div>
        </div>

        <div class="buttons">
            <!-- Hàng 1: C, ., %, × -->
            <button class="btn clear" id="clear" tabindex="-1">C</button>
            <button class="btn operator" id="dot" tabindex="-1">.</button>
            <button class="btn operator" id="percent" tabindex="-1">%</button>
            <button class="btn operator" id="multiply" tabindex="-1">×</button>

            <!-- Hàng 2: 7, 8, 9, − -->
            <button class="btn" id="7" tabindex="-1">7</button>
            <button class="btn" id="8" tabindex="-1">8</button>
            <button class="btn" id="9" tabindex="-1">9</button>
            <button class="btn operator" id="subtract" tabindex="-1">−</button>

            <!-- Hàng 3: 4, 5, 6, + (bắt đầu của nút dài) -->
            <button class="btn" id="4" tabindex="-1">4</button>
            <button class="btn" id="5" tabindex="-1">5</button>
            <button class="btn" id="6" tabindex="-1">6</button>
            <button class="btn operator plus-long" id="add" tabindex="-1">+</button>

            <!-- Hàng 4: 1, 2, 3, (ô trống cho nút + dài) -->
            <button class="btn" id="1" tabindex="-1">1</button>
            <button class="btn" id="2" tabindex="-1">2</button>
            <button class="btn" id="3" tabindex="-1">3</button>
            <!-- Ô thứ 4 hàng 4 để trống vì nút + đã chiếm 2 hàng -->

            <!-- Hàng 5: 0, 00, = -->
            <button class="btn zero" id="0" tabindex="-1">0</button>
            <button class="btn" id="00" tabindex="-1">00</button>
            <button class="btn equals" id="equals" tabindex="-1">=</button>        
        </div>
    </div>

    <!-- Indicator (nằm ngoài calculator) -->
    <div class="editing-indicator" id="editingIndicator">📝 ĐANG NHẬP SỐ KIỂM TRA</div>

    <!-- MỘT SCRIPT DUY NHẤT - ĐÃ TÍCH HỢP HOÀN CHỈNH -->
    <script>
        (function() {
            "use strict";

            // ===== LẤY ELEMENTS =====
            const mainDisplay = document.getElementById('display');
            const targetInput = document.getElementById('targetInput');
            const targetRow = document.querySelector('.target-row');
            const messageBox = document.getElementById('messageBox');
            const backspaceBtn = document.getElementById('backspaceBtn');
            const clearBtn = document.getElementById('clear');
            const equalsBtn = document.getElementById('equals');
            const indicator = document.getElementById('editingIndicator');

            // ===== BIẾN TRẠNG THÁI CHÍNH (Máy tính) =====
            let currentInput = '0';
            let previousInput = '';
            let operator = null;
            let shouldResetDisplay = false;
            let lastResult = null;

            // ===== BIẾN TRẠNG THÁI CHO CHẾ ĐỘ NHẬP SỐ KIỂM TRA =====
            let isEditingTarget = false;
            let tempTargetValue = '';

            // ===== CÁC HẰNG SỐ =====
            const MAX_INTEGER_LENGTH = 12;
            const MAX_DECIMAL_LENGTH = 4;

            // ===== HÀM TIỆN ÍCH CHUNG =====
            function flashButton(btn) {
                if (!btn) return;
                btn.classList.add('led-flash');
                setTimeout(() => {
                    btn.classList.remove('led-flash');
                }, 80);
            }

            // Thêm style cho flash display
            const style = document.createElement('style');
            style.textContent = `
                .led-flash-display {
                    text-shadow: 0 0 20px #7df9ff !important;
                }
            `;
            document.head.appendChild(style);

            // ===== CÁC HÀM XỬ LÝ SỐ (Máy tính) =====
            function limitNumberLength(numStr) {
                let parts = numStr.split('.');
                let intPart = parts[0];
                if (intPart.length > MAX_INTEGER_LENGTH) {
                    intPart = intPart.slice(0, MAX_INTEGER_LENGTH);
                }
                let decimalPart = parts[1] || '';
                if (decimalPart.length > MAX_DECIMAL_LENGTH) {
                    decimalPart = decimalPart.slice(0, MAX_DECIMAL_LENGTH);
                }
                if (parts.length > 1) {
                    return intPart + '.' + decimalPart;
                } else {
                    return intPart;
                }
            }

            function formatNumber(num) {
                if (num === null || num === undefined || num === '') return '0';
                let rounded = Math.round(num * 1e10) / 1e10;
                let parts = rounded.toString().split('.');
                let intPart = parts[0];
                if (intPart.length > MAX_INTEGER_LENGTH) {
                    intPart = intPart.slice(0, MAX_INTEGER_LENGTH);
                }
                intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
                let decimalPart = parts[1] || '';
                if (decimalPart.length > MAX_DECIMAL_LENGTH) {
                    decimalPart = decimalPart.slice(0, MAX_DECIMAL_LENGTH);
                }
                return decimalPart ? intPart + ',' + decimalPart : intPart;
            }

            function formatInputForDisplay(str) {
                if (str === '') return '0';
                let dotIndex = str.indexOf('.');
                if (dotIndex === -1) {
                    let intPart = str;
                    if (intPart.length > MAX_INTEGER_LENGTH) {
                        intPart = intPart.slice(0, MAX_INTEGER_LENGTH);
                    }
                    return intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
                } else {
                    let intPart = str.substring(0, dotIndex);
                    let decimalPart = str.substring(dotIndex + 1);
                    if (intPart.length > MAX_INTEGER_LENGTH) {
                        intPart = intPart.slice(0, MAX_INTEGER_LENGTH);
                    }
                    if (decimalPart.length > MAX_DECIMAL_LENGTH) {
                        decimalPart = decimalPart.slice(0, MAX_DECIMAL_LENGTH);
                    }
                    intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
                    if (decimalPart === '') {
                        return intPart + ',';
                    } else {
                        return intPart + ',' + decimalPart;
                    }
                }
            }

            function parseInputString(str) {
                if (!str) return NaN;
                // Chuẩn hóa: chuyển tất cả dấu phẩy thành dấu chấm
                let normalized = str.replace(/,/g, '.');
                // Loại bỏ tất cả ký tự không phải số và dấu chấm
                let cleaned = normalized.replace(/[^\d.]/g, '');
                
                // Xử lý nhiều dấu chấm - chỉ giữ dấu chấm cuối cùng
                let parts = cleaned.split('.');
                if (parts.length > 2) {
                    // Nếu có nhiều hơn 1 dấu chấm, giữ phần nguyên và phần thập phân từ dấu chấm cuối
                    let integerPart = parts.slice(0, -1).join('');
                    let decimalPart = parts[parts.length - 1];
                    cleaned = integerPart + '.' + decimalPart;
                }
                
                let dotIndex = cleaned.indexOf('.');
                let integerPart = dotIndex === -1 ? cleaned : cleaned.substring(0, dotIndex);
                let decimalPart = dotIndex === -1 ? '' : cleaned.substring(dotIndex + 1);
                
                if (integerPart.length > MAX_INTEGER_LENGTH) {
                    integerPart = integerPart.slice(0, MAX_INTEGER_LENGTH);
                }
                if (decimalPart.length > MAX_DECIMAL_LENGTH) {
                    decimalPart = decimalPart.slice(0, MAX_DECIMAL_LENGTH);
                }
                
                let finalStr = integerPart + (decimalPart ? '.' + decimalPart : '');
                return parseFloat(finalStr);
            }

            // ===== CÁC HÀM CẬP NHẬT MÀN HÌNH MÁY TÍNH =====
            function updateDisplayInput() {
                mainDisplay.textContent = formatInputForDisplay(currentInput);
                mainDisplay.classList.add('led-flash-display');
                setTimeout(() => {
                    mainDisplay.classList.remove('led-flash-display');
                }, 100);
                mainDisplay.scrollTop = mainDisplay.scrollHeight;
            }

            function updateDisplayFormatted(value) {
                let num = parseFloat(value);
                if (isNaN(num)) num = 0;
                mainDisplay.textContent = formatNumber(num);
                mainDisplay.classList.add('led-flash-display');
                setTimeout(() => {
                    mainDisplay.classList.remove('led-flash-display');
                }, 100);
                mainDisplay.scrollTop = mainDisplay.scrollHeight;
            }

            // ===== CÁC HÀM XỬ LÝ TÍNH TOÁN =====
            function inputNumber(num) {
                if (shouldResetDisplay) {
                    currentInput = '';
                    shouldResetDisplay = false;
                }

                if (num === '.') {
                    if (currentInput.includes('.')) return;
                    if (currentInput === '') currentInput = '0';
                }

                if (currentInput === '0' && num !== '.') {
                    currentInput = num;
                } else {
                    currentInput += num;
                }

                currentInput = limitNumberLength(currentInput);
                updateDisplayInput();
            }

            function handleOperator(op) {
                if (operator && !shouldResetDisplay) {
                    calculate();
                }
                previousInput = currentInput;
                operator = op;
                shouldResetDisplay = true;
            }

            function calculate() {
                if (!operator || shouldResetDisplay) return;

                let result;
                const prev = parseFloat(previousInput);
                const current = parseFloat(currentInput);

                if (isNaN(prev) || isNaN(current)) return;

                switch (operator) {
                    case '+': result = prev + current; break;
                    case '−': result = prev - current; break;
                    case '×': result = prev * current; break;
                    default: return;
                }

                currentInput = limitNumberLength(result.toString());
                lastResult = result;
                operator = null;
                previousInput = '';
                updateDisplayFormatted(currentInput);
                shouldResetDisplay = true;
            }

            function calculatePercent() {
                if (!operator || previousInput === '' || shouldResetDisplay) return;
                const prev = parseFloat(previousInput);
                const current = parseFloat(currentInput);
                if (isNaN(prev) || isNaN(current)) return;
                let result;
                switch (operator) {
                    case '+': result = prev + (prev * current / 100); break;
                    case '−': result = prev - (prev * current / 100); break;
                    case '×': result = prev * (current / 100); break;
                    default: return;
                }
                currentInput = limitNumberLength(result.toString());
                lastResult = result;
                operator = null;
                previousInput = '';
                updateDisplayFormatted(currentInput);
                shouldResetDisplay = true;
            }

            function handlePercent() {
                if (operator && previousInput !== '' && !shouldResetDisplay) {
                    calculatePercent();
                } else {
                    if (currentInput !== '0') {
                        let val = parseFloat(currentInput) / 100;
                        currentInput = limitNumberLength(val.toString());
                        updateDisplayFormatted(currentInput);
                        shouldResetDisplay = true;
                    }
                }
            }

            function clearAll() {
                currentInput = '0';
                previousInput = '';
                operator = null;
                shouldResetDisplay = false;
                lastResult = null;
                updateDisplayInput();
                
                // Nếu đang ở chế độ chỉnh sửa target thì thoát
                if (isEditingTarget) {
                    exitTargetEditing();
                } else {
                    targetInput.value = '';
                    delete targetInput.dataset.rawValue;
                }
                
                messageBox.textContent = '';
                messageBox.className = 'message-area';
            }

            function backspace() {
                if (currentInput.length > 1) {
                    currentInput = currentInput.slice(0, -1);
                } else {
                    currentInput = '0';
                }
                updateDisplayInput();
            }

            // ===== AUDIO =====
            let audioContext = null;
            function initAudioContext() {
                if (audioContext) return audioContext;
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    console.warn('Web Audio API không được hỗ trợ');
                }
                return audioContext;
            }

            function playSound(type) {
                const ctx = initAudioContext();
                if (!ctx) return;
                if (ctx.state === 'suspended') ctx.resume();

                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'success') {
                    osc.frequency.value = 880;
                    gain.gain.setValueAtTime(0.5, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                } else {
                    osc.frequency.setValueAtTime(220, now);
                    osc.frequency.exponentialRampToValueAtTime(160, now + 0.15);
                    osc.frequency.exponentialRampToValueAtTime(200, now + 0.3);
                    gain.gain.setValueAtTime(0.6, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                }
            }

            function vibrateMessage() {
                messageBox.classList.add('vibrate');
                setTimeout(() => {
                    messageBox.classList.remove('vibrate');
                }, 300);
            }

            // ===== HÀM XỬ LÝ SỐ KIỂM TRA (TARGET) =====
            function updateTargetInput() {
                if (tempTargetValue.length > 15) {
                    tempTargetValue = tempTargetValue.slice(0, 15);
                }
                
                targetInput.value = tempTargetValue;
                
                if (tempTargetValue && !isNaN(parseFloat(tempTargetValue))) {
                    targetInput.dataset.rawValue = parseFloat(tempTargetValue);
                } else {
                    delete targetInput.dataset.rawValue;
                }
                
                targetInput.scrollLeft = targetInput.scrollWidth;
            }

            function exitTargetEditing() {
                if (!isEditingTarget) return;
                
                isEditingTarget = false;
                targetInput.classList.remove('editing-mode');
                indicator.classList.remove('show');
                
                if (targetInput.dataset.rawValue) {
                    targetInput.value = formatNumber(parseFloat(targetInput.dataset.rawValue));
                } else {
                    targetInput.value = '';
                    delete targetInput.dataset.rawValue;
                }
                
                messageBox.textContent = '';
                messageBox.className = 'message-area';
                
                if (navigator.vibrate) navigator.vibrate(10);
            }

            // ===== XỬ LÝ SỰ KIỆN CHO NÚT = (KIỂM TRA KẾT QUẢ) =====
            function handleEquals() {
                if (operator) calculate();

                const currentValue = parseFloat(currentInput);
                let target = NaN;
                
                if (targetInput.dataset.rawValue !== undefined) {
                    target = parseFloat(targetInput.dataset.rawValue);
                } else if (targetInput.value.trim() !== '') {
                    target = parseInputString(targetInput.value);
                }

                if (!isNaN(target)) {
                    const diff = currentValue - target;
                    if (Math.abs(diff) < 1e-10) {
                        messageBox.textContent = '✅ Chính xác!';
                        messageBox.className = 'message-area success';
                        playSound('success');
                    } else {
                        const sign = diff > 0 ? '+' : '';
                        messageBox.textContent = `❌ Sai. Đúng: ${formatNumber(target)} (${sign}${formatNumber(diff)})`;
                        messageBox.className = 'message-area error';
                        playSound('error');
                    }
                    vibrateMessage();
                } else {
                    messageBox.textContent = targetInput.value ? 'Nhập số TK hợp lệ!' : '';
                    messageBox.className = 'message-area';
                }
            }

            // ===== XỬ LÝ SỰ KIỆN NHẤN NÚT =====
            function handleButtonPress(e, callback) {
                e.preventDefault();
                e.stopPropagation();
                targetInput.blur(); // Đảm bảo mất focus
                if (callback) callback();
            }

            // ===== GẮN SỰ KIỆN =====

            // --- Sự kiện cho target row (kích hoạt chế độ chỉnh sửa) ---
            targetRow.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                if (!isEditingTarget) {
                    isEditingTarget = true;
                    targetInput.classList.add('editing-mode');
                    indicator.classList.add('show');
                    
                    let currentVal = targetInput.dataset.rawValue || '';
                    tempTargetValue = currentVal ? currentVal.toString() : '';
                    targetInput.value = tempTargetValue || '0';
                    
                    messageBox.textContent = 'Đang nhập số kiểm tra - Nhấn ra ngoài để thoát';
                    messageBox.className = 'message-area';
                    
                    if (navigator.vibrate) navigator.vibrate(20);
                }
            }, true); // Dùng capture để bắt sự kiện sớm

            // --- Nhấn ra ngoài để thoát chế độ chỉnh sửa ---
            document.addEventListener('click', function(e) {
                if (isEditingTarget && 
                    !e.target.closest('.target-row') && 
                    !e.target.closest('.btn')) {
                    exitTargetEditing();
                }
            }, true);

            // --- Các nút số và toán tử ---
            const allButtons = document.querySelectorAll('.btn');
            allButtons.forEach(btn => {
                btn.addEventListener('pointerdown', (e) => {
                    // Nếu đang ở chế độ chỉnh sửa target
                    if (isEditingTarget) {
                        e.preventDefault();
                        e.stopPropagation();
                        flashButton(btn);

                        const id = btn.id;
                        
                        // Xử lý các nút số và dấu chấm
                        if (id.match(/^\d+$/)) {
                            tempTargetValue += id;
                            updateTargetInput();
                        }
                        else if (id === '00') {
                            tempTargetValue += '00';
                            updateTargetInput();
                        }
                        else if (id === 'dot') {
                            if (!tempTargetValue.includes('.')) {
                                if (tempTargetValue === '') {
                                    tempTargetValue = '0.';
                                } else {
                                    tempTargetValue += '.';
                                }
                                updateTargetInput();
                            }
                        }
                        else if (id === 'clear') {
                            tempTargetValue = '';
                            targetInput.value = '0';
                            delete targetInput.dataset.rawValue;
                        }
                        else if (id === 'backspaceBtn') {
                            if (tempTargetValue.length > 0) {
                                tempTargetValue = tempTargetValue.slice(0, -1);
                                targetInput.value = tempTargetValue || '0';
                                
                                if (tempTargetValue && !isNaN(parseFloat(tempTargetValue))) {
                                    targetInput.dataset.rawValue = parseFloat(tempTargetValue);
                                } else {
                                    delete targetInput.dataset.rawValue;
                                }
                            }
                        }
                        else if (id === 'equals') {
                            exitTargetEditing();
                            setTimeout(() => handleEquals(), 100);
                        }
                        else if (id === 'add' || id === 'subtract' || id === 'multiply' || id === 'percent') {
                            messageBox.textContent = '⚠️ Không dùng toán tử khi nhập số kiểm tra';
                            messageBox.className = 'message-area error';
                            setTimeout(() => {
                                if (isEditingTarget) {
                                    messageBox.textContent = 'Đang nhập số kiểm tra - Nhấn ra ngoài để thoát';
                                    messageBox.className = 'message-area';
                                }
                            }, 1500);
                        }
                        
                        return;
                    }

                    // Nếu KHÔNG ở chế độ chỉnh sửa, xử lý như máy tính bình thường
                    handleButtonPress(e, () => {
                        flashButton(btn);
                        const id = btn.id;

                        if (id.match(/^\d+$/) || id === '00' || id === 'dot') {
                            if (id === 'dot') inputNumber('.');
                            else if (id === '00') {
                                if (shouldResetDisplay) {
                                    currentInput = '';
                                    shouldResetDisplay = false;
                                }
                                if (currentInput === '0') {
                                    currentInput = '00';
                                } else {
                                    currentInput += '00';
                                }
                                currentInput = limitNumberLength(currentInput);
                                updateDisplayInput();
                            } else inputNumber(id);
                        }
                        else if (id === 'add') handleOperator('+');
                        else if (id === 'subtract') handleOperator('−');
                        else if (id === 'multiply') handleOperator('×');
                        else if (id === 'percent') handlePercent();
                        else if (id === 'clear') clearAll();
                        else if (id === 'equals') handleEquals();
                    });
                });
            });

            // Xử lý riêng cho backspace (vì nó không phải btn)
            backspaceBtn.addEventListener('pointerdown', (e) => {
                if (isEditingTarget) {
                    e.preventDefault();
                    e.stopPropagation();
                    flashButton(backspaceBtn);
                    
                    if (tempTargetValue.length > 0) {
                        tempTargetValue = tempTargetValue.slice(0, -1);
                        targetInput.value = tempTargetValue || '0';
                        
                        if (tempTargetValue && !isNaN(parseFloat(tempTargetValue))) {
                            targetInput.dataset.rawValue = parseFloat(tempTargetValue);
                        } else {
                            delete targetInput.dataset.rawValue;
                        }
                    }
                    return;
                }
                
                handleButtonPress(e, () => {
                    flashButton(backspaceBtn);
                    backspace();
                });
            });

            // ===== XỬ LÝ PHÍM TẮT =====
            window.addEventListener('keydown', (e) => {
                const key = e.key;
                
                // Nếu đang ở chế độ chỉnh sửa target
                if (isEditingTarget) {
                    e.preventDefault();
                    
                    if (key >= '0' && key <= '9') {
                        tempTargetValue += key;
                        updateTargetInput();
                        const btn = document.getElementById(key);
                        if (btn) flashButton(btn);
                    }
                    else if (key === '.') {
                        if (!tempTargetValue.includes('.')) {
                            if (tempTargetValue === '') {
                                tempTargetValue = '0.';
                            } else {
                                tempTargetValue += '.';
                            }
                            updateTargetInput();
                        }
                        const btn = document.getElementById('dot');
                        if (btn) flashButton(btn);
                    }
                    else if (key === 'Backspace') {
                        if (tempTargetValue.length > 0) {
                            tempTargetValue = tempTargetValue.slice(0, -1);
                            targetInput.value = tempTargetValue || '0';
                            if (tempTargetValue && !isNaN(parseFloat(tempTargetValue))) {
                                targetInput.dataset.rawValue = parseFloat(tempTargetValue);
                            } else {
                                delete targetInput.dataset.rawValue;
                            }
                        }
                        flashButton(backspaceBtn);
                    }
                    else if (key === 'Escape') {
                        exitTargetEditing();
                    }
                    else if (key === 'Enter') {
                        exitTargetEditing();
                        setTimeout(() => handleEquals(), 100);
                    }
                    
                    return;
                }
                
                // Nếu KHÔNG ở chế độ chỉnh sửa
                if (document.activeElement === targetInput) {
                    if (key === 'Enter') {
                        e.preventDefault();
                        handleEquals();
                    }
                    return;
                }

                e.preventDefault();

                if (key >= '0' && key <= '9') {
                    inputNumber(key);
                    flashButton(document.getElementById(key));
                }
                else if (key === '.') {
                    inputNumber('.');
                    flashButton(document.getElementById('dot'));
                }
                else if (key === '+') {
                    handleOperator('+');
                    flashButton(document.getElementById('add'));
                }
                else if (key === '-') {
                    handleOperator('−');
                    flashButton(document.getElementById('subtract'));
                }
                else if (key === '*') {
                    handleOperator('×');
                    flashButton(document.getElementById('multiply'));
                }
                else if (key === '%') {
                    handlePercent();
                    flashButton(document.getElementById('percent'));
                }
                else if (key === 'Enter' || key === '=') {
                    e.preventDefault();
                    handleEquals();
                }
                else if (key === 'Escape') {
                    clearAll();
                    flashButton(document.getElementById('clear'));
                }
                else if (key === 'Backspace') {
                    e.preventDefault();
                    backspace();
                    flashButton(backspaceBtn);
                }
            });

            // Khởi tạo
            clearAll();
        })();
    </script>
</body>
</html>
