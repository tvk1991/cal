<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2344/2344132.png">
    <title>ClevCalc Sentinel History+</title>
    <style>
        :root {
            --bg-color: #ffffff; --screen-bg: #ffffff; --keypad-bg: #f1f2f6;
            --key-bg: #ffffff; --key-text: #2d3436; --key-active: #e2e4e9;
            --expr-text: #2d3436; --target-area-bg: #fffaf5; --target-border: #ffecdb;
            --accent: #27ae60; --op-color: #f39c12; --target-color: #e67e22;
            --danger: #c0392b; --led-green: #27ae60; --led-green-glow: 0 0 6px rgba(39, 174, 96, 0.2);
            --led-orange: #e67e22; --led-orange-glow: 0 0 8px rgba(230, 126, 34, 0.3);
            --led-red: #e74c3c; --led-red-glow: 0 0 10px rgba(231, 76, 60, 0.4);
        }
        [data-theme="dark"] {
            --bg-color: #000000; --screen-bg: #000000; --keypad-bg: #121212;
            --key-bg: #1e1e1e; --key-text: #ffffff; --key-active: #333333;
            --expr-text: #888888; --target-area-bg: #1a1510; --target-border: #3d2b1f;
            --led-green: #2ecc71; --led-green-glow: 0 0 12px rgba(46, 204, 113, 0.4);
            --led-orange: #f39c12; --led-orange-glow: 0 0 15px rgba(243, 156, 18, 0.5);
        }
        * {
            box-sizing: border-box; -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
            touch-action: manipulation; font-weight: 600;
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
        }
        html, body {
            height: 100%; margin: 0; overflow: hidden;
            background-color: var(--bg-color); position: fixed; width: 100%;
            overscroll-behavior-y: contain;
        }
        .clevcalc-container {
            width: 100vw; height: 100dvh; max-width: 500px;
            background: var(--bg-color); display: flex; flex-direction: column;
            overflow: hidden; margin: 0 auto; position: relative;
        }
        .display-screen {
            flex: 1; width: 100%;
            padding: calc(env(safe-area-inset-top) + 10px) 25px 10px 25px;
            display: flex; flex-direction: column;
            justify-content: flex-end; text-align: right;
            background: var(--screen-bg); z-index: 5;
        }
        #expression {
            font-size: 1.7rem; line-height: 1.5; color: var(--expr-text);
            min-height: 9.75rem; max-height: 9.75rem;
            overflow-y: auto; margin-bottom: 8px; font-weight: 500;
            word-wrap: break-word; overflow-wrap: break-word;
            word-break: normal; white-space: pre-wrap; scrollbar-width: none;
            -webkit-user-select: none; user-select: none; touch-action: none; 
        }
        #expression::-webkit-scrollbar { display: none; }
        .expr-cursor {
            display: inline-block; width: 2.5px; height: 1.15em;
            background: var(--led-green); vertical-align: text-bottom;
            border-radius: 2px; animation: blink-cur 1s step-end infinite;
            box-shadow: var(--led-green-glow); margin: 0 1px; pointer-events: none;
        }
        @keyframes blink-cur { 50% { opacity: 0; } }
        #result-preview {
            font-size: clamp(2.2rem, 10vw, 2.8rem); color: var(--led-green);
            text-shadow: var(--led-green-glow); line-height: 1.1;
            overflow: hidden; white-space: nowrap; font-weight: 800;
            text-overflow: ellipsis; margin-bottom: 8px;
        }
        #comparison-msg { font-size: 0.9rem; font-weight: 800; text-align: center; min-height: 22px; margin-bottom: 12px; }
        
        .action-row {
            display: flex; align-items: stretch; gap: 8px; margin-bottom: 5px; height: 48px;
            width: 100%;
        }
        .target-area {
            flex: 1; display: flex; align-items: center; background: var(--target-area-bg);
            border-radius: 14px; padding: 0 15px; border: 1px solid var(--target-border);
            gap: 10px;
            min-width: 0;
        }
        .btn-back-wrap {
            background: var(--target-area-bg); border: 1px solid var(--target-border);
            border-radius: 14px; padding: 0 20px; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        [data-theme="dark"] .btn-back-wrap { background: var(--target-area-bg); border-color: var(--target-border); }

        .active-target { background: #fff5eb !important; border-color: var(--target-color) !important; outline: 2px solid var(--target-color); }
        [data-theme="dark"] .active-target { background: #2a1f15 !important; }
        .keypad {
            height: 55%; width: 100%; display: grid;
            grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr);
            background: var(--keypad-bg); gap: 1px;
            padding-bottom: calc(env(safe-area-inset-bottom) + 15px); 
        }
        button {
            background: var(--key-bg); border: none; font-size: 1.6rem;
            color: var(--key-text); display: flex; justify-content: center;
            align-items: center; cursor: pointer; -webkit-user-drag: none;
            touch-action: manipulation;
        }
        button:active { background: var(--key-active); transition: background 0.02s; }
        .btn-op { color: var(--op-color); font-weight: 900; }
        .btn-func { color: var(--accent); font-weight: 900; }
        .btn-clear { color: var(--danger); font-weight: 900; }
        .btn-equal { background: var(--accent); color: white; font-size: 2.2rem; font-weight: 800; }
        .btn-plus { grid-row: span 2; color: var(--op-color); font-weight: 900; }
        .control-btn { display: flex; align-items: center; justify-content: center; cursor: pointer; touch-action: manipulation; }
        .control-btn svg { width: 22px; height: 22px; stroke-width: 2.5; fill: none; pointer-events: none; }
        #openHistory svg { stroke: var(--target-color); }
        #theme-toggle svg { fill: var(--target-color); stroke: var(--target-color); }
        .btn-back-ctrl svg { stroke: var(--key-text); }
        .divider { width: 1px; height: 20px; background: var(--target-border); flex-shrink: 0; }
        .target-label { font-size: 0.7rem; color: var(--target-color); font-weight: 800; flex-shrink: 0; transition: opacity 0.2s; }
        #target-display { 
            flex: 1; font-size: 1.4rem; color: var(--led-orange); text-shadow: var(--led-orange-glow); 
            font-weight: 900; margin-left: 5px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            transition: font-size 0.2s ease;
        }
        .history-box {
            position: absolute; inset: 0; background: var(--screen-bg); z-index: 100;
            display: none; flex-direction: column; padding: 20px;
            padding-top: calc(env(safe-area-inset-top) + 15px);
        }
        .history-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .history-item { border-bottom: 1px solid var(--keypad-bg); padding: 15px 0; cursor: pointer; touch-action: manipulation; }
        .history-expr { color: var(--expr-text); font-size: 1.1rem; margin-bottom: 4px; opacity: 0.7; pointer-events: none; }
        .history-res { font-weight: 900; text-align: right; font-size: 1.6rem; color: var(--led-green); pointer-events: none; }
        .shake { animation: shake 0.4s both; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .neon-danger { color: var(--led-red) !important; text-shadow: var(--led-red-glow) !important; }
        @keyframes blink-led-green {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent); }
            50% { opacity: 0.5; text-shadow: 0 0 5px var(--accent), 0 0 15px var(--accent); }
        }
        @keyframes blink-led-red {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--danger), 0 0 20px var(--danger); }
            50% { opacity: 0.5; text-shadow: 0 0 5px var(--danger), 0 0 15px var(--danger); }
        }
        @keyframes blink-led-orange {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--led-orange), 0 0 20px var(--led-orange); }
            50% { opacity: 0.5; text-shadow: 0 0 5px var(--led-orange), 0 0 15px var(--led-orange); }
        }
        @keyframes blink-led-warning {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--danger), 0 0 20px var(--danger); transform: scale(1);}
            50% { opacity: 0.3; text-shadow: 0 0 20px var(--danger), 0 0 40px var(--danger); transform: scale(1.02); color: #ff4444;}
        }
        .led-blink-green { animation: blink-led-green 1.2s ease-in-out infinite !important; }
        .led-blink-red { animation: blink-led-red 1.2s ease-in-out infinite !important; }
        .led-blink-orange { animation: blink-led-orange 1.2s ease-in-out infinite !important; }
        .led-blink-warning { animation: blink-led-warning 0.8s ease-in-out infinite !important; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="clevcalc-container">
    <div id="historyBox" class="history-box">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span style="font-size: 1.6rem; font-weight: 900; color: var(--accent);">Lịch sử</span>
            <div id="closeHistory" class="control-btn" style="padding: 5px;">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="color:var(--key-text)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
        </div>
        <div id="historyList" class="history-list"></div>
        <button id="clearHistoryBtn" style="margin-top: 15px; min-height: 55px; background: var(--keypad-bg); font-size: 1rem; border-radius: 12px; color: var(--danger); width:100%; touch-action: manipulation;">Xóa tất cả lịch sử</button>
    </div>

    <div class="display-screen">
        <div id="expression"></div>
        <div id="result-preview">0</div>
        <div id="comparison-msg"></div>
        
        <div class="action-row">
            <div class="target-area" id="target-area-container">
                <div class="control-btn" id="openHistory" style="padding: 5px;">
                    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" fill="none"></circle><polyline points="12 6 12 12 16 14" stroke="currentColor" fill="none"></polyline></svg>
                </div>
                <div class="divider"></div>
                <div class="control-btn" id="theme-toggle" style="padding: 5px;">
                    <svg id="theme-icon" viewBox="0 0 24 24" stroke="currentColor" fill="none"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                </div>
                <div class="divider"></div>
                <div id="target-box" style="display:flex; align-items:center; flex:1; height:100%; cursor:pointer; touch-action: manipulation; justify-content: flex-end;">
                    <span class="target-label" id="target-label-text">MỤC TIÊU:</span>
                    <div id="target-display">0</div>
                </div>
            </div>
            
            <div class="control-btn btn-back-ctrl btn-back-wrap" id="btn-backspace">
                <svg viewBox="0 0 24 24" stroke="currentColor" fill="none"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
            </div>
        </div>
    </div>

    <div class="keypad">
        <button class="btn-clear" data-val="C">C</button>
        <button class="btn-func" data-val="()">()</button>
        <button class="btn-func" data-val="%">%</button>
        <button class="btn-op" data-val="*">×</button>
        <button data-val="7">7</button>
        <button data-val="8">8</button>
        <button data-val="9">9</button>
        <button class="btn-op" data-val="-">−</button>
        <button data-val="4">4</button>
        <button data-val="5">5</button>
        <button data-val="6">6</button>
        <button class="btn-op btn-plus" data-val="+">+</button>
        <button data-val="1">1</button>
        <button data-val="2">2</button>
        <button data-val="3">3</button>
        <button data-val="0">0</button>
        <button data-val="00">00</button>
        <button data-val=".">,</button>
        <button class="btn-equal" data-val="=">=</button>
    </div>
</div>

<script>
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }
    
    let historyExpr = ""; 
    let targetInput = "";
    let isTargetMode = false;
    let calculationHistory = JSON.parse(localStorage.getItem('calc_history') || '[]');
    let cursorPos = null; 
    let isResultDisplayed = false;

    const exprDiv = document.getElementById('expression'), resDiv = document.getElementById('result-preview'), targetDiv = document.getElementById('target-display'), targetBox = document.getElementById('target-box'), msgDiv = document.getElementById('comparison-msg'), hBox = document.getElementById('historyBox'), hList = document.getElementById('historyList');
	
    function removeLedBlink() {
        msgDiv.classList.remove('led-blink-green', 'led-blink-red', 'led-blink-orange', 'led-blink-warning');
    }
    
    function playSound(type) {
        try {
            const ctx = initAudio();
            const osc = ctx.createOscillator(), gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } else if (type === 'success') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1046.5, ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.7, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc.start(); osc.stop(ctx.currentTime + 0.4);
            } else if (type === 'fail') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, ctx.currentTime);
                gain.gain.setValueAtTime(1.0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
                osc.start(); osc.stop(ctx.currentTime + 0.5);
            }
        } catch(e) { console.log('Audio error', e); }
    }
    
    function lightImpact() {
        if (window.webkit && window.webkit.messageHandlers) return;
        if (window.TapticEngine) { try { window.TapticEngine.impact('light'); } catch(e) {} }
        else if (navigator.vibrate) navigator.vibrate(8);
    }

    function formatNumber(val) {
        if (!val && val !== 0) return "";
        let s = val.toString().split('.');
        s[0] = s[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        return s.length > 1 ? s[0] + "," + s[1] : s[0];
    }

    function preprocessForEval(raw) {
        let str = raw;
        str = str.replace(/\+\s*([\d\.]+)%/g, ' * (1 + $1/100)');
        str = str.replace(/\-\s*([\d\.]+)%/g, ' * (1 - $1/100)');
        str = str.replace(/([\d\.]+)%/g, '($1/100)');
        return str;
    }

    document.querySelectorAll('[data-val]').forEach(btn => {
        btn.addEventListener('pointerdown', (e) => {
            if (e.clientY && e.clientY > window.innerHeight - 35) return;
            e.preventDefault(); lightImpact(); 
            const v = btn.getAttribute('data-val');
            if (v === 'C') clearAll();
            else if (v === '()') smartParenthesis();
            else if (v === '%') applyPercent(); 
            else if (['+','-','*'].includes(v)) addOp(v);
            else if (v === '=') calculate();
            else handleInput(v);
        });
    });

    function handleInput(n) {
        playSound('click');
        if (isResultDisplayed && !isTargetMode) {
            historyExpr = ""; isResultDisplayed = false; cursorPos = null;
        }

        if (isTargetMode) {
            if (n === '.' && targetInput.includes('.')) return;
            if (n === '%') return; 
            targetInput += n;
        } else {
            if (cursorPos !== null) {
                historyExpr = historyExpr.slice(0, cursorPos) + n + historyExpr.slice(cursorPos);
                cursorPos += n.length;
            } else {
                historyExpr += n;
            }
            autoPreview();
        }
        renderDisplay();
    }

    function addOp(op) {
        playSound('click'); isResultDisplayed = false;
        if (isTargetMode) isTargetMode = false;
        if (cursorPos !== null) {
            const charBefore = cursorPos > 0 ? historyExpr[cursorPos - 1] : '';
            if (['+','-','*','/'].includes(charBefore)) {
                historyExpr = historyExpr.slice(0, cursorPos - 1) + op + historyExpr.slice(cursorPos);
            } else {
                historyExpr = historyExpr.slice(0, cursorPos) + op + historyExpr.slice(cursorPos);
                cursorPos++;
            }
        } else {
            const last = historyExpr.slice(-1);
            if (['+','-','*','/'].includes(last)) historyExpr = historyExpr.slice(0, -1) + op;
            else if (historyExpr !== "" || op === '-') historyExpr += op;
        }
        renderDisplay(); autoPreview();
    }

    function applyPercent() {
        if (isTargetMode) return;
        handleInput('%');
    }

    let backTimer, backInterval;
    const btnBack = document.getElementById('btn-backspace');
    function backspace() {
        if (isTargetMode) targetInput = targetInput.slice(0, -1);
        else {
            if (cursorPos !== null) {
                if (cursorPos > 0) {
                    historyExpr = historyExpr.slice(0, cursorPos - 1) + historyExpr.slice(cursorPos);
                    cursorPos--;
                }
            } else historyExpr = historyExpr.slice(0, -1);
            autoPreview();
        }
        renderDisplay();
    }
    btnBack.addEventListener('pointerdown', (e) => {
        if (e.clientY && e.clientY > window.innerHeight - 35) return;
        e.preventDefault(); lightImpact(); playSound('click'); backspace();
        backTimer = setTimeout(() => { backInterval = setInterval(() => { lightImpact(); backspace(); }, 70); }, 500);
    });
    const stopBack = () => { clearTimeout(backTimer); clearInterval(backInterval); };
    btnBack.addEventListener('pointerup', stopBack); btnBack.addEventListener('pointerleave', stopBack);

    function calculate() {
        playSound('click');
        if (isTargetMode) { isTargetMode = false; renderDisplay(); return; }
        let raw = historyExpr; if (!raw) return;
        cursorPos = null;
        try {
            while (['+','-','*','/','(','.'].includes(raw.slice(-1))) raw = raw.slice(0, -1);
            
            let processedRaw = preprocessForEval(raw);
            let open = (processedRaw.match(/\(/g) ||[]).length, close = (processedRaw.match(/\)/g) ||[]).length;
            if (open > close) processedRaw += ")".repeat(open - close);

            let res = eval(processedRaw); 
            let finalRes = Math.round(res * 1000000) / 1000000;
            if (targetInput !== "") {
                if (Math.abs(finalRes - parseFloat(targetInput)) < 0.00001) {
                    msgDiv.innerText = "✅ KHỚP TUYỆT ĐỐI"; 
                    msgDiv.style.color = "var(--accent)"; 
                    msgDiv.classList.add('led-blink-green');
                    playSound('success');
                } else {
                    let diff = Math.round((finalRes - parseFloat(targetInput)) * 100) / 100;
                    if (diff > 0) {
                        msgDiv.innerText = "❌ VƯỢT: " + formatNumber(Math.abs(diff));
                        msgDiv.classList.add('led-blink-red');
                    } else {
                        msgDiv.innerText = "❌ THIẾU: " + formatNumber(Math.abs(diff));
                        msgDiv.classList.add('led-blink-orange');
                    }
                    msgDiv.style.color = "var(--danger)"; 
                    playSound('fail');
                }
            }
            calculationHistory.push({ expr: exprDiv.innerText || historyExpr, res: finalRes, raw: raw });
            if (calculationHistory.length > 50) calculationHistory.shift();
            localStorage.setItem('calc_history', JSON.stringify(calculationHistory));
            resDiv.innerText = formatNumber(finalRes); historyExpr = finalRes.toString();
            exprDiv.innerHTML = ""; isResultDisplayed = true;
        } catch(e) { resDiv.innerText = "Lỗi"; }
        renderDisplay();
    }

    function autoPreview() {
        try {
            let temp = historyExpr; if (!temp) { resDiv.innerText = "0"; return; }
            while (['+','-','*','/','(','.'].includes(temp.slice(-1))) temp = temp.slice(0, -1);
            
            let processedTemp = preprocessForEval(temp);
            
            let open = (processedTemp.match(/\(/g) ||[]).length, close = (processedTemp.match(/\)/g) ||[]).length;
            if (open > close) processedTemp += ")".repeat(open - close);
            let pVal = Math.round(eval(processedTemp) * 1000000) / 1000000;
            resDiv.innerText = formatNumber(pVal);
            if (targetInput !== "" && pVal > parseFloat(targetInput)) {
                resDiv.classList.add('neon-danger'); 
                msgDiv.innerText = "⚠️ VƯỢT QUÁ!"; 
                msgDiv.style.color = "var(--danger)";
                msgDiv.classList.add('led-blink-warning');
            } else { 
                resDiv.classList.remove('neon-danger'); 
                if (!msgDiv.innerText.includes("KHỚP") && !msgDiv.innerText.includes("VƯỢT") && !msgDiv.innerText.includes("THIẾU"))
                    msgDiv.classList.remove('led-blink-warning');
                if (!isTargetMode && !msgDiv.innerText.includes("KHỚP")) msgDiv.innerText = ""; 
            }
        } catch(e) { resDiv.innerText = "0"; }
    }

    function renderDisplay() {
        const targetLabelEl = document.getElementById('target-label-text');

        if (!msgDiv.innerText.includes("KHỚP") && !msgDiv.innerText.includes("VƯỢT") && !msgDiv.innerText.includes("THIẾU") && !msgDiv.innerText.includes("⚠️")) {
            removeLedBlink();
        }
        if (isTargetMode) {
            document.getElementById('target-area-container').classList.add('active-target');
        } else {
            document.getElementById('target-area-container').classList.remove('active-target');
            if (cursorPos !== null) {
                const fmt = s => {
                    let str = s.replace(/\*/g,' × ').replace(/\//g,' ÷ ').replace(/\+/g,' + ').replace(/\-/g,' − ');
                    return str.replace(/(\d+(\.\d+)?)/g, match => formatNumber(match));
                };
                const pre = fmt(historyExpr.slice(0, cursorPos));
                const post = fmt(historyExpr.slice(cursorPos));
                exprDiv.innerHTML = pre + '<span class="expr-cursor"></span>' + post;
            } else {
                let displayStr = historyExpr.replace(/\*/g,' × ').replace(/\//g,' ÷ ').replace(/\+/g,' + ').replace(/\-/g,' − ');
                displayStr = displayStr.replace(/(\d+(\.\d+)?)/g, match => formatNumber(match));
                exprDiv.innerHTML = displayStr;
            }
        }
        
        let tLen = targetInput.length;
        // PHẦN HIỆU CHỈNH: Đổi ngưỡng từ 5 sang 3 để thu nhỏ sớm hơn
        if (tLen > 2) {
            targetLabelEl.style.display = 'none';
            let newSize = Math.max(0.8, 1.4 - (tLen - 2) * 0.1);
            targetDiv.style.fontSize = newSize + 'rem';
        } else {
            targetLabelEl.style.display = 'inline-block';
            targetDiv.style.fontSize = '1.4rem';
        }
        targetDiv.innerText = formatNumber(targetInput) || "0";

        if (exprDiv.scrollHeight > exprDiv.clientHeight) exprDiv.scrollTop = exprDiv.scrollHeight;
    }

    let touchStartX = 0;
    let initialCursorPos = 0;

    exprDiv.addEventListener('touchstart', function(e) {
        if (historyExpr === "" || isTargetMode) return;
        e.preventDefault(); 
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        if (cursorPos === null) cursorPos = historyExpr.length;
        initialCursorPos = cursorPos;
        renderDisplay();
        lightImpact();
    }, { passive: false });

    exprDiv.addEventListener('touchmove', function(e) {
        if (historyExpr === "" || isTargetMode) return;
        e.preventDefault(); 
        const touch = e.touches[0];
        let deltaX = touch.clientX - touchStartX;
        let charsToMove = Math.round(deltaX / 15);
        let newPos = initialCursorPos + charsToMove;
        newPos = Math.max(0, Math.min(historyExpr.length, newPos));
        if (newPos !== cursorPos) {
            cursorPos = newPos;
            renderDisplay();
            lightImpact();
        }
    }, { passive: false });

    function renderHistory() {
        hList.innerHTML = [...calculationHistory].reverse().map((item, idx) => {
            const originalIdx = calculationHistory.length - 1 - idx;
            return `<div class="history-item" data-history-index="${originalIdx}">
                        <div class="history-expr">${item.expr} =</div>
                        <div class="history-res">${formatNumber(item.res)}</div>
                    </div>`;
        }).join('');
        document.querySelectorAll('.history-item').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(el.getAttribute('data-history-index'));
                if (!isNaN(idx)) loadEditHistory(idx);
            });
        });
    }

    function loadEditHistory(index) {
        const item = calculationHistory[index];
        if (!item) return;
        historyExpr = item.raw || item.expr.replace(/ × /g,'*').replace(/ ÷ /g,'/').replace(/ − /g,'-').replace(/\./g,'').replace(/,/g,'.');
        cursorPos = historyExpr.length;
        isResultDisplayed = false;
        hBox.style.display = 'none';
        playSound('click'); renderDisplay(); autoPreview();
    }
    window.loadEditHistory = loadEditHistory;

    function clearAll() {
        playSound('click');
        if (isTargetMode) targetInput = "";
        else { historyExpr = ""; targetInput = ""; msgDiv.innerText = ""; cursorPos = null; isResultDisplayed = false; }
        resDiv.innerText = "0"; resDiv.classList.remove('neon-danger'); renderDisplay();
    }

    function smartParenthesis() {
        playSound('click');
        let open = (historyExpr.match(/\(/g) ||[]).length, close = (historyExpr.match(/\)/g) ||[]).length;
        let char = (open > close && !['+','-','*','/','('].includes(historyExpr.slice(-1))) ? ")" : "(";
        if (cursorPos !== null) {
            historyExpr = historyExpr.slice(0, cursorPos) + char + historyExpr.slice(cursorPos); cursorPos++;
        } else { historyExpr += char; }
        renderDisplay(); autoPreview();
    }

    document.getElementById('theme-toggle').onclick = () => {
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        const icon = document.getElementById('theme-icon');
        if (!isDark) {
            icon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
            icon.setAttribute('fill', 'currentColor');
        } else {
            icon.innerHTML = '<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>';
            icon.setAttribute('fill', 'none');
        }
        lightImpact(); playSound('click');
    };

    document.getElementById('openHistory').onclick = () => { hBox.style.display = 'flex'; renderHistory(); lightImpact(); };
    document.getElementById('closeHistory').onclick = () => { hBox.style.display = 'none'; lightImpact(); };
    document.getElementById('clearHistoryBtn').onclick = () => { calculationHistory = []; localStorage.setItem('calc_history', '[]'); renderHistory(); lightImpact(); playSound('click'); };
    targetBox.onclick = () => { isTargetMode = !isTargetMode; renderDisplay(); lightImpact(); };
    
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.body.setAttribute('data-theme', 'dark');
        document.getElementById('theme-icon').innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
        document.getElementById('theme-icon').setAttribute('fill', 'currentColor');
    }
    renderDisplay();
</script>
</body>
</html>
