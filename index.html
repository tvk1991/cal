<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
	<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2344/2344132.png">
    
    <title>ClevCalc Sentinel History+</title>
    <style>
        :root {
            --bg-color: #ffffff; --screen-bg: #ffffff; --keypad-bg: #f1f2f6;
            --key-bg: #ffffff; --key-text: #2d3436; --key-active: #e2e4e9;
            --expr-text: #2d3436; --target-area-bg: #fffaf5; --target-border: #ffecdb;
            --accent: #27ae60; --op-color: #f39c12; --target-color: #e67e22;
            --danger: #c0392b; --led-green: #27ae60; --led-green-glow: 0 0 6px rgba(39, 174, 96, 0.2);
            --led-orange: #e67e22; --led-orange-glow: 0 0 8px rgba(230, 126, 34, 0.3);
            --led-red: #e74c3c; --led-red-glow: 0 0 10px rgba(231, 76, 60, 0.4);
        }

        [data-theme="dark"] {
            --bg-color: #000000; --screen-bg: #000000; --keypad-bg: #121212;
            --key-bg: #1e1e1e; --key-text: #ffffff; --key-active: #333333;
            --expr-text: #888888; --target-area-bg: #1a1510; --target-border: #3d2b1f;
            --led-green: #2ecc71; --led-green-glow: 0 0 12px rgba(46, 204, 113, 0.4);
            --led-orange: #f39c12; --led-orange-glow: 0 0 15px rgba(243, 156, 18, 0.5);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: manipulation; 
            font-weight: 600; 
            transition: background 0.2s, color 0.2s;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        html, body { 
            height: 100%; margin: 0; overflow: hidden; 
            background-color: var(--bg-color); position: fixed; width: 100%;
            overscroll-behavior-y: contain;
        }

        .clevcalc-container {
            width: 100vw; height: 100dvh; max-width: 500px;
            background: var(--bg-color); display: flex; flex-direction: column; 
            overflow: hidden; margin: 0 auto;
        }

        .display-screen {
            flex: 1; 
            width: 100%; 
            padding: calc(env(safe-area-inset-top) + 10px) 25px 10px 25px;
            display: flex; flex-direction: column; 
            justify-content: flex-end; 
            text-align: right; background: var(--screen-bg); z-index: 5;
        }

        #expression { 
            font-size: 1.3rem; 
            line-height: 1.5; 
            color: var(--expr-text); 
            min-height: 9.75rem; 
            max-height: 9.75rem; 
            overflow-y: auto; 
            margin-bottom: 8px; 
            font-weight: 500; 
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: normal; 
            white-space: pre-wrap; 
            scrollbar-width: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #expression::-webkit-scrollbar { display: none; }
        
        #result-preview { 
            font-size: clamp(2.2rem, 10vw, 2.8rem); 
            color: var(--led-green); 
            text-shadow: var(--led-green-glow); 
            line-height: 1.1; 
            overflow: hidden; white-space: nowrap; font-weight: 800; 
            text-overflow: ellipsis; margin-bottom: 8px;
        }

        #comparison-msg { font-size: 0.9rem; font-weight: 800; text-align: center; min-height: 22px; margin-bottom: 12px; }

        .target-area { 
            display: flex; align-items: center; background: var(--target-area-bg); 
            border-radius: 14px; padding: 10px 15px; border: 1px solid var(--target-border);
            gap: 10px; margin-bottom: 5px;
        }

        .keypad {
            height: 50%; 
            width: 100%; display: grid; 
            grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr);
            background: var(--keypad-bg); gap: 1px; 
            padding-bottom: env(safe-area-inset-bottom);
        }

        .control-btn { display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 5px; }
        .control-btn svg { width: 22px; height: 22px; stroke-width: 2.5; fill: none; pointer-events: none; }
        #openHistory svg { stroke: var(--target-color); }
        #theme-toggle svg { fill: var(--target-color); }
        
        /* Màu riêng cho nút Back trong target-area để dễ nhận diện */
        .btn-back-ctrl svg { stroke: var(--key-text); }
        
        .divider { width: 1px; height: 20px; background: var(--target-border); }
        .target-label { font-size: 0.7rem; color: var(--target-color); font-weight: 800; }
        #target-display { flex: 1; font-size: 1.4rem; color: var(--led-orange); text-shadow: var(--led-orange-glow); font-weight: 900; }

        button { 
            background: var(--key-bg); border: none; font-size: 1.6rem; 
            color: var(--key-text); display: flex; justify-content: center; 
            align-items: center; cursor: pointer;
            -webkit-user-drag: none;
        }
        button:active { background: var(--key-active); }
        
        .btn-op { color: var(--op-color); font-weight: 900; }
        .btn-func { color: var(--accent); font-weight: 900; }
        .btn-clear { color: var(--danger); font-weight: 900; }
        .btn-equal { background: var(--accent); color: white; font-size: 2.2rem; font-weight: 800; }
        .btn-plus { grid-row: span 2; color: var(--op-color); font-weight: 900; }
        
        .history-box {
            position: absolute; inset: 0; background: var(--screen-bg); z-index: 100; 
            display: none; flex-direction: column; padding: 20px;
            padding-top: calc(env(safe-area-inset-top) + 15px);
        }
        .history-list { flex: 1; overflow-y: auto; }
        .history-item { border-bottom: 1px solid var(--keypad-bg); padding: 15px 0; }
        .history-expr { color: var(--expr-text); font-size: 1.1rem; margin-bottom: 4px; opacity: 0.7; }
        .history-res { font-weight: 900; text-align: right; font-size: 1.6rem; color: var(--led-green); }

        .active-target { background: #fff5eb !important; border-color: var(--target-color) !important; outline: 2px solid var(--target-color); }
        [data-theme="dark"] .active-target { background: #2a1f15 !important; }
        
        .shake { animation: shake 0.4s both; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .neon-danger { color: var(--led-red) !important; text-shadow: var(--led-red-glow) !important; }
    </style>
</head>
<body oncontextmenu="return false;"> 
<div class="clevcalc-container">
    <div id="historyBox" class="history-box">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span style="font-size: 1.6rem; font-weight: 900; color: var(--accent);">Lịch sử</span>
            <div id="closeHistory" class="control-btn">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="color:var(--key-text)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </div>
        </div>
        <div id="historyList" class="history-list"></div> 
        <button id="clearHistoryBtn" style="margin-top: 15px; min-height: 55px; background: var(--keypad-bg); font-size: 1rem; border-radius: 12px; color: var(--danger); width:100%">Xóa tất cả lịch sử</button>
    </div>

    <div class="display-screen">
        <div id="expression"></div>   
        <div id="result-preview">0</div>  
        <div id="comparison-msg"></div>    
        <div class="target-area" id="target-area-container">
            <!-- Nút Lịch sử -->
            <div class="control-btn" id="openHistory">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            </div>
            <div class="divider"></div>
            <!-- Nút Theme -->
            <div class="control-btn" id="theme-toggle">
                <svg id="theme-icon" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
            </div>
            
            <div class="divider"></div>
            <!-- Vùng hiển thị Mục tiêu -->
            <div id="target-box" style="display:flex; align-items:center; flex:1; height:100%; cursor:pointer;">
                <span class="target-label">MỤC TIÊU:</span>
                <div id="target-display">0</div>
            </div>
			 <div class="control-btn btn-back-ctrl" data-val="back">
                <svg viewBox="0 0 24 24"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
            </div>
        </div>
    </div>

    <div class="keypad">
        <button class="btn-clear" data-val="C">C</button>
        <button class="btn-func" data-val="()">()</button>
        <button class="btn-func" data-val="%">%</button>
		<button class="btn-op" data-val="*">×</button>
        
        
        <button data-val="7">7</button>
        <button data-val="8">8</button>
        <button data-val="9">9</button>
        <button class="btn-op" data-val="-">−</button>
        
        <button data-val="4">4</button>
        <button data-val="5">5</button>
        <button data-val="6">6</button>
        <button class="btn-op btn-plus" data-val="+">+</button>
        
        <button data-val="1">1</button>
        <button data-val="2">2</button>
        <button data-val="3">3</button>
        <button data-val="0">0</button>
        
        <button data-val="00">00</button>
        <button data-val=".">,</button>
        <button class="btn-equal" data-val="=">=</button>
    </div>
</div>

<script>
    /* GIỮ NGUYÊN TOÀN BỘ LOGIC 100% */
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let historyExpr = "";          
    let targetInput = "";          
    let isTargetMode = false;      
    let calculationHistory = JSON.parse(localStorage.getItem('calc_history') || '[]');

    const exprDiv = document.getElementById('expression');
    const resDiv = document.getElementById('result-preview');
    const targetDiv = document.getElementById('target-display');
    const targetBox = document.getElementById('target-box');
    const msgDiv = document.getElementById('comparison-msg');
    const hBox = document.getElementById('historyBox');
    const hList = document.getElementById('historyList');

    function vibrate() { if (navigator.vibrate) navigator.vibrate(15); }

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); 
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'click') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'success') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1046.5, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        } else if (type === 'fail') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }
    }

    const buttons = document.querySelectorAll('[data-val]');
    buttons.forEach(btn => {
        btn.addEventListener('pointerdown', (e) => { 
            e.preventDefault(); vibrate(); handleCommand(btn.getAttribute('data-val')); 
        });
    });

    function handleCommand(val) {
        playSound('click');
        if (val === 'C') clearAll();
        else if (val === '()') smartParenthesis();
        else if (val === '%') applyPercent();
        else if (val === '-') addOp('-');
        else if (val === '*') addOp('*');
        else if (val === '+') addOp('+');
        else if (val === 'back') backspace();
        else if (val === '=') calculate();
        else if (val === '.') handleInput('.');
        else handleInput(val);
    }

    document.getElementById('theme-toggle').addEventListener('pointerdown', (e) => {
        e.preventDefault(); vibrate();
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('theme-icon').innerHTML = isDark ? 
            '<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>' :
            '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
        playSound('click');
    });

    document.getElementById('openHistory').addEventListener('pointerdown', (e) => { e.preventDefault(); vibrate(); toggleHistory(); });
    document.getElementById('closeHistory').addEventListener('pointerdown', (e) => { e.preventDefault(); vibrate(); toggleHistory(); });
    document.getElementById('clearHistoryBtn').addEventListener('pointerdown', (e) => { e.preventDefault(); vibrate(); clearHistory(); });
    targetBox.addEventListener('pointerdown', (e) => { e.preventDefault(); vibrate(); toggleTargetMode(); });

    function formatNumber(val) {
        if (!val && val !== 0) return "";
        let s = val.toString(); let parts = s.split('.');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        return parts.length > 1 ? parts[0] + "," + parts[1] : parts[0];
    }

    function toggleHistory() { 
        hBox.style.display = hBox.style.display === 'flex' ? 'none' : 'flex'; 
        if (hBox.style.display === 'flex') renderHistory(); 
    }
    
    function renderHistory() {
        hList.innerHTML = calculationHistory.map(item => `
            <div class="history-item">
                <div class="history-expr">${item.expr} =</div>
                <div class="history-res">${formatNumber(item.res)}</div>
            </div>
        `).reverse().join('');
    }
    
    function clearHistory() { 
        calculationHistory = []; localStorage.removeItem('calc_history'); renderHistory(); 
    }

    function toggleTargetMode() {
        isTargetMode = !isTargetMode;
        document.getElementById('target-area-container').classList.toggle('active-target', isTargetMode);
        msgDiv.innerText = isTargetMode ? "Đang nhập Mục tiêu..." : "";
        msgDiv.style.color = "var(--target-color)";
    }

    function renderDisplay() {
        if (!isTargetMode) {
            let displayStr = historyExpr.replace(/\*/g, ' × ').replace(/\//g, ' ÷ ').replace(/\+/g, ' + ').replace(/\-/g, ' − ');
            displayStr = displayStr.replace(/(\d+(\.\d+)?)/g, (match) => formatNumber(match));
            exprDiv.innerText = displayStr;
            exprDiv.scrollTop = exprDiv.scrollHeight;
        }
        targetDiv.innerText = formatNumber(targetInput) || "0";
    }

    function handleInput(n) {
        if (isTargetMode) {
            if (n === '.' && targetInput.includes('.')) return;
            targetInput += n;
        } else {
            if (targetInput !== "" && !isNaN(n)) {
                let cleanedExpr = historyExpr + n;
                while (['+','-','*','/','(','.'].includes(cleanedExpr.slice(-1))) { cleanedExpr = cleanedExpr.slice(0, -1); }
                try {
                    let open = (cleanedExpr.match(/\(/g) || []).length;
                    let close = (cleanedExpr.match(/\)/g) || []).length;
                    if (open > close) cleanedExpr += ")".repeat(open - close);
                    let potential = Math.round(eval(cleanedExpr) * 1000000) / 1000000;
                    if (potential > parseFloat(targetInput)) {
                        msgDiv.innerText = "⚠️ SẼ VƯỢT MỤC TIÊU!";
                        msgDiv.style.color = "var(--danger)";
                        msgDiv.classList.add('shake');
                        setTimeout(() => msgDiv.classList.remove('shake'), 400);
                        resDiv.classList.add('neon-danger');
                        playSound('fail'); 
                    }
                } catch(e) {}
            }
            historyExpr += n; autoPreview();
        }
        renderDisplay();
    }

    function smartParenthesis() {
        if (isTargetMode) return;
        let open = (historyExpr.match(/\(/g) || []).length;
        let close = (historyExpr.match(/\)/g) || []).length;
        const last = historyExpr.slice(-1);
        if (open > close && !['+','-','*','/','('].includes(last)) historyExpr += ")"; else historyExpr += "(";
        renderDisplay(); autoPreview();
    }

    function addOp(op) {
        if (isTargetMode) {
            isTargetMode = false; document.getElementById('target-area-container').classList.remove('active-target');
        }
        const last = historyExpr.slice(-1);
        if (['+','-','*','/'].includes(last)) historyExpr = historyExpr.slice(0, -1) + op;
        else if (historyExpr !== "" || op === '-') historyExpr += op;
        resDiv.classList.remove('neon-danger'); renderDisplay(); autoPreview();
    }

    function applyPercent() {
        if (isTargetMode) return;
        try {
            let parts = historyExpr.split(/([\+\-\*\/])/);
            let lastPart = parts.pop(); let op = parts.pop();
            let base = eval(parts.join("") || "0");
            let val = (op === '+' || op === '-') ? base * (parseFloat(lastPart) / 100) : parseFloat(lastPart) / 100;
            historyExpr = parts.join("") + (op || "") + val;
            renderDisplay(); autoPreview();
        } catch(e) {}
    }

    function autoPreview() {
        try {
            let temp = historyExpr; if (!temp) { resDiv.innerText = "0"; return; }
            while (['+','-','*','/','(','.'].includes(temp.slice(-1))) { temp = temp.slice(0, -1); }
            if (!temp) { resDiv.innerText = "0"; return; }
            let open = (temp.match(/\(/g) || []).length;
            let close = (temp.match(/\)/g) || []).length;
            if (open > close) temp += ")".repeat(open - close);
            let pVal = Math.round(eval(temp) * 1000000) / 1000000;
            resDiv.innerText = formatNumber(pVal);
            if (targetInput !== "" && pVal > parseFloat(targetInput)) {
                resDiv.classList.add('neon-danger'); msgDiv.innerText = "⚠️ VƯỢT QUÁ!"; msgDiv.style.color = "var(--danger)";
            } else {
                resDiv.classList.remove('neon-danger'); if(!isTargetMode) msgDiv.innerText = "";
            }
        } catch(e) { resDiv.innerText = "0"; }
    }

    function calculate() {
        if (isTargetMode) {
            isTargetMode = false; document.getElementById('target-area-container').classList.remove('active-target'); return;
        }
        try {
            let temp = historyExpr; if (!temp) return;
            while (['+','-','*','/','(','.'].includes(temp.slice(-1))) { temp = temp.slice(0, -1); }
            let res = eval(temp); let finalRes = Math.round(res * 1000000) / 1000000;
            if (targetInput !== "") {
                if (Math.abs(finalRes - parseFloat(targetInput)) < 0.00001) {
                    msgDiv.innerText = "✅ KHỚP TUYỆT ĐỐI"; msgDiv.style.color = "var(--accent)"; playSound('success');
                } else {
                    let diff = Math.round((finalRes - parseFloat(targetInput)) * 100) / 100;
                    msgDiv.innerText = (diff > 0 ? "❌ VƯỢT: " : "❌ THIẾU: ") + formatNumber(Math.abs(diff));
                    msgDiv.style.color = "var(--danger)"; playSound('fail');
                }
            }
            calculationHistory.push({ expr: exprDiv.innerText || historyExpr, res: finalRes });
            if (calculationHistory.length > 50) calculationHistory.shift();
            localStorage.setItem('calc_history', JSON.stringify(calculationHistory));
            resDiv.innerText = formatNumber(finalRes); historyExpr = finalRes.toString(); exprDiv.innerText = "";
        } catch(e) { resDiv.innerText = "Lỗi"; }
    }

    function clearAll() {
        if (isTargetMode) targetInput = "";
        else { historyExpr = ""; targetInput = ""; msgDiv.innerText = ""; }
        resDiv.innerText = "0"; resDiv.classList.remove('neon-danger'); renderDisplay();
    }

    function backspace() {
        if (isTargetMode) targetInput = targetInput.slice(0, -1);
        else { historyExpr = historyExpr.slice(0, -1); autoPreview(); }
        renderDisplay();
    }

    document.body.addEventListener('pointerdown', () => { if (audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });
</script>
</body>
</html>
