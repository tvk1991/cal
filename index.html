<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ClevCalc Fixed No-Scroll</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --accent: #2ecc71;
            --text-main: #2c3e50;
            --op-color: #f39c12;
            --target-color: #3498db;
            --danger: #e74c3c;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: manipulation;
            user-select: none;
            font-weight: 600; 
        }

        html, body { 
            height: 100%; margin: 0; overflow: hidden; 
            background-color: #1a1a1a; display: flex; justify-content: center;
            position: fixed; width: 100%;
        }

        .clevcalc-container {
            width: 100vw; height: 100dvh; max-width: 500px;
            background: var(--bg-color); position: relative;
            display: flex; flex-direction: column; overflow: hidden;
        }

        .display-screen {
            height: 40%; width: 100%;
            padding: 20px 20px 10px;
            display: flex; flex-direction: column; justify-content: flex-end; 
            text-align: right; position: relative; background: white; z-index: 5;
        }

        #expression { 
            font-size: 2.2rem; color: #7f8c8d; 
            max-height: 120px; overflow-y: auto; 
            word-break: break-all; margin-bottom: 5px;
            transition: font-size 0.2s ease;
            scroll-behavior: smooth;
            font-weight: 500;
        }
        
        /* ĐÃ KHÓA CUỘN: Kết quả không được phép cuộn */
        #result-preview { 
            font-size: 3.5rem; 
            color: var(--text-main); 
            line-height: 1; 
            overflow: hidden; /* Tuyệt đối không cuộn */
            white-space: nowrap;
            font-weight: 800; 
            text-overflow: ellipsis; /* Nếu quá dài sẽ hiện dấu ... thay vì tràn */
        }

        #comparison-msg { 
            font-size: 1.5rem; 
            font-weight: 900; 
            text-align: center; height: 24px; margin: 5px 0; 
            letter-spacing: 0.5px;
        }

        .target-area { 
            display: flex; align-items: center; background: #f9f9f9; 
            border-radius: 8px; padding: 5px 12px; border: 1px dashed var(--target-color);
            margin-top: 5px;
        }
        .history-btn { 
            font-size: 1.3rem; color: #bdc3c7; padding: 5px 10px 5px 0; 
            cursor: pointer; border-right: 1px solid #eee; margin-right: 10px;
            display: flex; align-items: center;
        }
        .target-label { font-size: 1.2rem; color: var(--target-color); font-weight: 800; margin-right: 8px; }
        #target-display { flex: 1; font-size: 1.7rem; color: var(--target-color); font-weight: 900; text-align: right; }

        .keypad {
            height: 60%; width: 100%;
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr);
            background: #ccc; gap: 1px;
            position: absolute; bottom: 0; left: 0;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 20;
        }

        button {
            width: 100%; height: 100%; border: none; background: #fff;
            font-size: 1.8rem; color: #333; outline: none;
            display: flex; justify-content: center; align-items: center;
            font-weight: 700;
        }
        button.pressed { background: #f0f0f0; transform: scale(0.95); }

        .btn-op { color: var(--op-color); font-weight: 900; }
        .btn-func { color: var(--accent); font-weight: 900; }
        .btn-clear { color: var(--danger); font-weight: 900; }
        .btn-equal { background: var(--accent); color: white; font-size: 2.5rem; font-weight: 900; }
        .btn-plus { grid-row: span 2; color: var(--op-color); font-weight: 900; }
        
        .shake { animation: shake 0.4s both; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .history-box {
            position: absolute; inset: 0;
            background: white; z-index: 100; display: none; flex-direction: column; padding: 20px;
            padding-top: env(safe-area-inset-top);
        }
        .history-list { flex: 1; overflow-y: auto; }
        .history-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        #expression::-webkit-scrollbar { width: 0; background: transparent; }
        .active-target { background: #e3f2fd !important; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="clevcalc-container">
    <div id="historyBox" class="history-box">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <b style="color:var(--accent)">LỊCH SỬ</b>
            <span id="closeHistory" style="font-size: 1.5rem; cursor:pointer; padding: 10px;">✖</span>
        </div>
        <div id="historyList" class="history-list"></div>
        <button id="clearHistoryBtn" style="height:50px; background:#f2f2f2; font-size:1rem; border-radius: 8px;">Xóa lịch sử</button>
    </div>

    <div class="display-screen">
        <div id="expression"></div>
        <div id="result-preview">0</div>
        <div id="comparison-msg"></div>
        <div class="target-area">
            <div class="history-btn" id="openHistory">🕒</div>
            <div id="target-box" style="display:flex; align-items:center; flex:1; height:100%">
                <span class="target-label">KIỂM TRA:</span>
                <div id="target-display">0</div>
            </div>
        </div>
    </div>

    <div class="keypad">
        <button class="btn-clear" data-val="C">C</button>
        <button class="btn-func" data-val="()">()</button>
        <button class="btn-func" data-val="%">%</button>
        <button class="btn-op" data-val="-">−</button>
        <button data-val="7">7</button>
        <button data-val="8">8</button>
        <button data-val="9">9</button>
        <button class="btn-op" data-val="*">×</button>
        <button data-val="4">4</button>
        <button data-val="5">5</button>
        <button data-val="6">6</button>
        <button class="btn-op btn-plus" data-val="+">+</button>
        <button data-val="1">1</button>
        <button data-val="2">2</button>
        <button data-val="3">3</button>
        <button data-val="back">⌫</button>
        <button data-val="0">0</button>
        <button data-val=".">,</button>
        <button class="btn-equal" data-val="=">=</button>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        if (type === 'click') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'success') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1046.5, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        } else if (type === 'fail') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }
    }

    let historyExpr = "";
    let targetInput = "";
    let isTargetMode = false;
    let calculationHistory = [];

    const exprDiv = document.getElementById('expression');
    const resDiv = document.getElementById('result-preview');
    const targetDiv = document.getElementById('target-display');
    const targetBox = document.getElementById('target-box');
    const msgDiv = document.getElementById('comparison-msg');
    const hBox = document.getElementById('historyBox');
    const hList = document.getElementById('historyList');

    const buttons = document.querySelectorAll('button[data-val]');
    buttons.forEach(btn => {
        const handleAction = (e) => {
            e.preventDefault();
            playSound('click');
            btn.classList.add('pressed');
            const val = btn.getAttribute('data-val');
            if (val === 'C') clearAll();
            else if (val === '()') smartParenthesis();
            else if (val === '%') applyPercent();
            else if (val === '-') addOp('-');
            else if (val === '*') addOp('*');
            else if (val === '+') addOp('+');
            else if (val === 'back') backspace();
            else if (val === '=') calculate();
            else if (val === '.') handleInput('.');
            else handleInput(val);
            setTimeout(() => btn.classList.remove('pressed'), 100);
        };
        btn.addEventListener('touchstart', handleAction, {passive: false});
        btn.addEventListener('mousedown', (e) => { if(e.button === 0) handleAction(e); });
    });

    document.getElementById('openHistory').addEventListener('touchstart', (e) => { e.preventDefault(); toggleHistory(); });
    document.getElementById('closeHistory').addEventListener('touchstart', (e) => { e.preventDefault(); toggleHistory(); });
    document.getElementById('clearHistoryBtn').addEventListener('touchstart', (e) => { e.preventDefault(); clearHistory(); });
    targetBox.addEventListener('touchstart', (e) => { e.preventDefault(); toggleTargetMode(); });

    document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

    function formatNumber(val) {
        if (!val && val !== 0) return "";
        let s = val.toString();
        let parts = s.split('.');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        return parts.length > 1 ? parts[0] + "," + parts[1] : parts[0];
    }

    function toggleHistory() { hBox.style.display = hBox.style.display === 'flex' ? 'none' : 'flex'; renderHistory(); }
    function renderHistory() {
        hList.innerHTML = calculationHistory.map(item => `
            <div class="history-item">
                <div style="color:#7f8c8d; font-size:0.9rem">${item.expr} =</div>
                <div style="font-weight:bold; text-align:right; font-size:1.2rem">${formatNumber(item.res)}</div>
            </div>
        `).reverse().join('');
    }
    function clearHistory() { calculationHistory = []; renderHistory(); }

    function toggleTargetMode() {
        isTargetMode = !isTargetMode;
        document.querySelector('.target-area').classList.toggle('active-target', isTargetMode);
        msgDiv.innerText = isTargetMode ? "Đang nhập Số kiểm tra..." : "";
    }

    function renderDisplay() {
        if (!isTargetMode) {
            let displayStr = historyExpr.replace(/\*/g, ' × ').replace(/\//g, ' ÷ ').replace(/\+/g, ' + ').replace(/\-/g, ' − ');
            displayStr = displayStr.replace(/(\d+(\.\d+)?)/g, (match) => formatNumber(match));
            exprDiv.innerText = displayStr;
            const len = exprDiv.innerText.length;
            if (len > 40) exprDiv.style.fontSize = "1.2rem";
            else if (len > 20) exprDiv.style.fontSize = "1.6rem";
            else exprDiv.style.fontSize = "2.2rem";
            setTimeout(() => { exprDiv.scrollTop = exprDiv.scrollHeight; }, 10);
            // KHÔNG CUỘN DÒNG KẾT QUẢ NỮA
        }
        targetDiv.innerText = formatNumber(targetInput) || "0";
    }

    function handleInput(n) {
        if (isTargetMode) { if (n === '.' && targetInput.includes('.')) return; targetInput += n; }
        else { historyExpr += n; autoPreview(); }
        renderDisplay();
    }

    function smartParenthesis() {
        if (isTargetMode) return;
        let open = (historyExpr.match(/\(/g) || []).length;
        let close = (historyExpr.match(/\)/g) || []).length;
        const last = historyExpr.slice(-1);
        if (open > close && !['+','-','*','/','('].includes(last)) historyExpr += ")";
        else historyExpr += "(";
        renderDisplay(); autoPreview();
    }

    function addOp(op) {
        if (isTargetMode) { isTargetMode = false; document.querySelector('.target-area').classList.remove('active-target'); }
        const last = historyExpr.slice(-1);
        if (['+','-','*','/'].includes(last)) historyExpr = historyExpr.slice(0, -1) + op;
        else if (historyExpr !== "" || op === '-') historyExpr += op;
        renderDisplay();
    }

    function applyPercent() {
        if (isTargetMode) return;
        try {
            let parts = historyExpr.split(/([\+\-\*\/])/);
            let lastPart = parts.pop();
            let op = parts.pop();
            let base = eval(parts.join("") || "0");
            let val = (op === '+' || op === '-') ? base * (parseFloat(lastPart) / 100) : parseFloat(lastPart) / 100;
            historyExpr = parts.join("") + (op || "") + val;
            renderDisplay(); autoPreview();
        } catch(e) {}
    }

    function autoPreview() {
        try {
            let temp = historyExpr;
            if (!temp) { resDiv.innerText = "0"; return; }
            while (['+','-','*','/','('].includes(temp.slice(-1))) { temp = temp.slice(0, -1); }
            if (!temp) return;
            let open = (temp.match(/\(/g) || []).length;
            let close = (temp.match(/\)/g) || []).length;
            if (open > close) temp += ")".repeat(open - close);
            resDiv.innerText = formatNumber(Math.round(eval(temp) * 1000000) / 1000000);
        } catch(e) {}
    }

    function calculate() {
        if (isTargetMode) { isTargetMode = false; document.querySelector('.target-area').classList.remove('active-target'); return; }
        try {
            let temp = historyExpr;
            if (!temp) return;
            while (['+','-','*','/','(','.'].includes(temp.slice(-1))) { temp = temp.slice(0, -1); }
            if (!temp) return;
            let open = (temp.match(/\(/g) || []).length;
            let close = (temp.match(/\)/g) || []).length;
            if (open > close) temp += ")".repeat(open - close);
            let res = eval(temp);
            let finalRes = Math.round(res * 1000000) / 1000000;
            calculationHistory.push({ expr: exprDiv.innerText, res: finalRes });
            resDiv.innerText = formatNumber(finalRes);
            if (targetInput !== "") {
                msgDiv.classList.remove('shake');
                void msgDiv.offsetWidth;
                if (Math.abs(finalRes - parseFloat(targetInput)) < 0.00001) {
                    msgDiv.innerText = "✅ KHỚP TUYỆT ĐỐI"; msgDiv.style.color = "var(--accent)";
                    playSound('success');
                } else {
                    msgDiv.innerText = `❌ LỆCH: ${formatNumber(Math.round((finalRes - parseFloat(targetInput)) * 100) / 100)}`;
                    msgDiv.style.color = "var(--danger)"; msgDiv.classList.add('shake');
                    playSound('fail');
                }
            }
            historyExpr = finalRes.toString(); exprDiv.innerText = "";
        } catch(e) { resDiv.innerText = "Lỗi"; }
    }

    function clearAll() {
        if (isTargetMode) targetInput = "";
        else { historyExpr = ""; targetInput = ""; msgDiv.innerText = ""; }
        resDiv.innerText = "0"; renderDisplay();
    }

    function backspace() {
        if (isTargetMode) targetInput = targetInput.slice(0, -1);
        else { historyExpr = historyExpr.slice(0, -1); autoPreview(); }
        renderDisplay();
    }
</script>
</body>
</html>
