<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2344/2344132.png">
    <title>ClevCalc Pro Ultimate v2.0</title>
    <style>
        :root {
            --bg-color: #ffffff; --screen-bg: #ffffff; --keypad-bg: #f1f2f6;
            --key-bg: #ffffff; --key-text: #2d3436; --key-active: #e2e4e9;
            --expr-text: #2d3436; --target-area-bg: #fffaf5; --target-border: #ffecdb;
            --accent: #27ae60; --op-color: #f39c12; --target-color: #e67e22;
            --danger: #c0392b; --led-green: #27ae60; --led-green-glow: 0 0 8px rgba(39, 174, 96, 0.3);
            --led-orange: #e67e22; --led-orange-glow: 0 0 10px rgba(230, 126, 34, 0.4);
            --led-red: #e74c3c; --led-red-glow: 0 0 12px rgba(231, 76, 60, 0.5);
        }
        [data-theme="dark"] {
            --bg-color: #000000; --screen-bg: #000000; --keypad-bg: #121212;
            --key-bg: #1e1e1e; --key-text: #ffffff; --key-active: #333333;
            --expr-text: #888888; --target-area-bg: #1a1510; --target-border: #3d2b1f;
            --led-green: #2ecc71; --led-green-glow: 0 0 15px rgba(46, 204, 113, 0.5);
            --led-orange: #f39c12; --led-orange-glow: 0 0 18px rgba(243, 156, 18, 0.6);
        }
        * {
            box-sizing: border-box; -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
            touch-action: manipulation; font-weight: 600;
            -webkit-user-select: none; user-select: none;
        }
        html, body {
            height: 100%; margin: 0; overflow: hidden;
            background-color: var(--bg-color); position: fixed; width: 100%;
        }
        .clevcalc-container {
            width: 100vw; height: 100dvh; max-width: 500px;
            background: var(--bg-color); display: flex; flex-direction: column;
            overflow: hidden; margin: 0 auto; position: relative;
        }

        /* --- DISPLAY SECTION --- */
        .display-screen {
            flex: 1; width: 100%;
            padding: calc(env(safe-area-inset-top) + 15px) 25px 10px 25px;
            display: flex; flex-direction: column;
            justify-content: flex-end; text-align: right;
            background: var(--screen-bg); z-index: 5;
        }
        #expression {
            font-size: 1.8rem; line-height: 1.4; color: var(--expr-text);
            min-height: 9rem; max-height: 9rem; overflow-y: auto;
            margin-bottom: 10px; font-weight: 500;
            word-wrap: break-word; overflow-wrap: break-word;
            white-space: pre-wrap; scrollbar-width: none;
        }
        #expression::-webkit-scrollbar { display: none; }
        
        .expr-cursor {
            display: inline-block; width: 3px; height: 1.2em;
            background: var(--led-green); vertical-align: text-bottom;
            border-radius: 2px; animation: blink-cur 1s step-end infinite;
            box-shadow: var(--led-green-glow); margin: 0 1px;
        }
        @keyframes blink-cur { 50% { opacity: 0; } }

        #result-preview {
            font-size: clamp(2.4rem, 11vw, 3.2rem); color: var(--led-green);
            text-shadow: var(--led-green-glow); line-height: 1;
            overflow: hidden; white-space: nowrap; font-weight: 900;
            text-overflow: ellipsis; margin-bottom: 10px;
        }
        #comparison-msg { font-size: 0.95rem; font-weight: 900; text-align: center; min-height: 24px; margin-bottom: 15px; }

        /* --- ACTION ROW (KHUNG MÀU CAM TỐI ƯU) --- */
        .action-row {
            display: flex; align-items: stretch; gap: 10px; height: 56px; width: 100%;
        }
        .target-area {
            flex: 1; display: flex; align-items: center; background: var(--target-area-bg);
            border-radius: 16px; border: 1.5px solid var(--target-border);
            padding: 0 12px; gap: 10px; overflow: hidden; transition: all 0.2s;
        }
        .active-target { 
            background: rgba(230, 126, 34, 0.08) !important; 
            border-color: var(--target-color) !important;
            box-shadow: 0 0 10px rgba(230, 126, 34, 0.15);
        }

        .target-clickable-zone {
            flex: 1; display: flex; align-items: center; height: 100%; 
            min-width: 0; justify-content: flex-end; cursor: pointer;
        }
        .target-label { 
            font-size: 0.75rem; color: var(--target-color); font-weight: 900; 
            margin-right: 6px; white-space: nowrap; flex-shrink: 0;
            transition: opacity 0.2s, transform 0.2s;
        }
        #target-display { 
            font-size: 1.6rem; color: var(--led-orange); text-shadow: var(--led-orange-glow); 
            font-weight: 900; white-space: nowrap; text-align: right;
            transition: font-size 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-back-wrap {
            background: var(--target-area-bg); border: 1.5px solid var(--target-border);
            border-radius: 16px; width: 68px; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; cursor: pointer;
        }

        /* --- KEYPAD SECTION --- */
        .keypad {
            height: 55%; width: 100%; display: grid;
            grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr);
            background: var(--keypad-bg); gap: 1px;
            padding-bottom: calc(env(safe-area-inset-bottom) + 10px); 
        }
        button {
            background: var(--key-bg); border: none; font-size: 1.7rem;
            color: var(--key-text); display: flex; justify-content: center;
            align-items: center; cursor: pointer; position: relative;
        }
        button:active { background: var(--key-active); transform: scale(0.98); }
        .btn-op { color: var(--op-color); font-weight: 900; }
        .btn-func { color: var(--accent); font-weight: 900; }
        .btn-clear { color: var(--danger); font-weight: 900; }
        .btn-equal { background: var(--accent); color: white; font-size: 2.4rem; font-weight: 800; }
        .btn-plus { grid-row: span 2; color: var(--op-color); font-weight: 900; }
        
        .control-btn { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px;}
        .control-btn svg { width: 22px; height: 22px; stroke-width: 2.8; fill: none; pointer-events: none; }
        #openHistory svg { stroke: var(--target-color); }
        #theme-toggle svg { fill: var(--target-color); stroke: var(--target-color); }
        .btn-back-ctrl svg { stroke: var(--key-text); width: 28px; height: 28px; }
        .divider { width: 1.5px; height: 22px; background: var(--target-border); flex-shrink: 0; }

        /* --- HISTORY BOX --- */
        .history-box {
            position: absolute; inset: 0; background: var(--screen-bg); z-index: 100;
            display: none; flex-direction: column; padding: 25px;
            padding-top: calc(env(safe-area-inset-top) + 20px);
        }
        .history-list { flex: 1; overflow-y: auto; padding-right: 5px; }
        .history-item { border-bottom: 1px solid var(--target-border); padding: 18px 0; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .history-expr { font-size: 1.1rem; color: var(--expr-text); opacity: 0.7; margin-bottom: 5px; }
        .history-res { font-weight: 900; text-align: right; font-size: 1.8rem; color: var(--led-green); }

        .led-blink-green { animation: blink-led-green 1.2s infinite; }
        @keyframes blink-led-green { 50% { opacity: 0.6; } }
        .led-blink-red { animation: blink-led-red 0.8s infinite; }
        @keyframes blink-led-red { 50% { color: #ff0000; filter: brightness(1.5); } }
    </style>
</head>
<body>

<div class="clevcalc-container">
    <div id="historyBox" class="history-box">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <span style="font-size: 1.8rem; color: var(--accent); font-weight: 900;">Lịch Sử</span>
            <div id="closeHistory" class="control-btn" style="width: 44px; height: 44px;">
                <svg viewBox="0 0 24 24" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </div>
        </div>
        <div id="historyList" class="history-list"></div>
        <button id="clearHistoryBtn" style="margin-top: 15px; height: 60px; border-radius: 15px; background: var(--keypad-bg); color: var(--danger); font-size: 1.1rem;">Xóa toàn bộ lịch sử</button>
    </div>

    <div class="display-screen">
        <div id="expression"></div>
        <div id="result-preview">0</div>
        <div id="comparison-msg"></div>
        
        <div class="action-row">
            <div class="target-area" id="target-area-container">
                <div class="control-btn" id="openHistory">
                    <svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                </div>
                <div class="divider"></div>
                <div class="control-btn" id="theme-toggle">
                    <svg id="theme-icon" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                </div>
                <div class="divider"></div>
                
                <div class="target-clickable-zone" id="target-box">
                    <span class="target-label" id="target-lbl">MỤC TIÊU:</span>
                    <div id="target-display">0</div>
                </div>
            </div>
            
            <div class="btn-back-wrap btn-back-ctrl" id="btn-backspace">
                <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
            </div>
        </div>
    </div>

    <div class="keypad">
        <button class="btn-clear" data-val="C">C</button>
        <button class="btn-func" data-val="()">()</button>
        <button class="btn-func" data-val="%">%</button>
        <button class="btn-op" data-val="*">×</button>
        <button data-val="7">7</button>
        <button data-val="8">8</button>
        <button data-val="9">9</button>
        <button class="btn-op" data-val="-">−</button>
        <button data-val="4">4</button>
        <button data-val="5">5</button>
        <button data-val="6">6</button>
        <button class="btn-op btn-plus" data-val="+">+</button>
        <button data-val="1">1</button>
        <button data-val="2">2</button>
        <button data-val="3">3</button>
        <button data-val="0">0</button>
        <button data-val="00">00</button>
        <button data-val=".">,</button>
        <button class="btn-equal" data-val="=">=</button>
    </div>
</div>

<script>
    // --- HỆ THỐNG ÂM THANH & RUNG ---
    let audioCtx = null;
    function playSound(freq = 800, type = 'sine', duration = 0.08) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        } catch(e){}
    }
    function vibrate(ms = 15) { if (navigator.vibrate) navigator.vibrate(ms); }

    // --- BIẾN TRẠNG THÁI ---
    let historyExpr = "", targetInput = "", isTargetMode = false, isResultDisplayed = false, cursorPos = null;
    let calculationHistory = JSON.parse(localStorage.getItem('clev_history') || '[]');

    const exprDiv = document.getElementById('expression'), resDiv = document.getElementById('result-preview'), 
          targetDiv = document.getElementById('target-display'), targetLbl = document.getElementById('target-lbl'),
          targetBox = document.getElementById('target-box'), msgDiv = document.getElementById('comparison-msg'),
          hBox = document.getElementById('historyBox'), hList = document.getElementById('historyList');

    // --- XỬ LÝ SỐ & LOGIC KẾ TOÁN ---
    function formatNumber(val) {
        if (val === "" || val === null) return "";
        let parts = val.toString().split('.');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        return parts.length > 1 ? parts[0] + "," + parts[1] : parts[0];
    }

    function preprocess(raw) {
        let s = raw;
        // Logic kế toán: 25.000 x 2% + 2% = 510
        // Tìm cụm "số * số%" hoặc "số + số%"
        s = s.replace(/(\d+)\s*([\+\-\*\/])\s*([\d\.]+)%/g, (m, p1, op, p2) => {
            if (op === '*' || op === '/') return `(${p1}${op}(${p2}/100))`;
            return `(${p1}${op}(${p1}*${p2}/100))`;
        });
        s = s.replace(/([\d\.]+)%/g, "($1/100)");
        return s;
    }

    // --- RENDER DISPLAY & DYNAMIC TARGET ---
    function render() {
        // Tối ưu khung màu cam
        if (isTargetMode) document.getElementById('target-area-container').classList.add('active-target');
        else document.getElementById('target-area-container').classList.remove('active-target');

        // Logic ẩn nhãn khi số quá dài (Fix lỗi cắt số)
        if (targetInput.length > 5) {
            targetLbl.style.opacity = "0";
            targetLbl.style.transform = "translateX(-10px)";
            setTimeout(() => { if (targetInput.length > 5) targetLbl.style.display = "none"; }, 200);
        } else {
            targetLbl.style.display = "block";
            setTimeout(() => { targetLbl.style.opacity = "1"; targetLbl.style.transform = "translateX(0)"; }, 10);
        }

        // Font size động cho mục tiêu
        let len = targetInput.length;
        let baseSize = 1.6;
        if (len > 5) baseSize = Math.max(0.9, 1.6 - (len - 5) * 0.12);
        targetDiv.style.fontSize = `${baseSize}rem`;
        targetDiv.innerText = formatNumber(targetInput) || "0";

        // Biểu thức chính & con trỏ
        let displayStr = historyExpr.replace(/\*/g,' × ').replace(/\//g,' ÷ ').replace(/\+/g,' + ').replace(/\-/g,' − ');
        displayStr = displayStr.replace(/(\d+(\.\d+)?)/g, m => formatNumber(m));
        
        if (cursorPos !== null && !isTargetMode) {
            let pre = displayStr.substring(0, cursorPos);
            let post = displayStr.substring(cursorPos);
            exprDiv.innerHTML = `${pre}<span class="expr-cursor"></span>${post}`;
        } else {
            exprDiv.innerHTML = displayStr;
        }
        exprDiv.scrollTop = exprDiv.scrollHeight;
    }

    function autoPreview() {
        try {
            let temp = historyExpr; if (!temp) { resDiv.innerText = "0"; return; }
            while ("+-*/(.".includes(temp.slice(-1))) temp = temp.slice(0, -1);
            let processed = preprocess(temp);
            let open = (processed.match(/\(/g)||[]).length, close = (processed.match(/\)/g)||[]).length;
            if (open > close) processed += ")".repeat(open - close);
            let val = eval(processed);
            resDiv.innerText = formatNumber(Math.round(val * 1000000) / 1000000);
        } catch(e) {}
    }

    // --- HÀNH ĐỘNG ---
    function handleInput(v) {
        playSound(); vibrate();
        if (isResultDisplayed && !isTargetMode && !"+-*/%".includes(v)) {
            historyExpr = ""; isResultDisplayed = false; cursorPos = null;
            msgDiv.innerText = "";
        }
        if (isTargetMode) {
            if (v === "." && targetInput.includes(".")) return;
            if (v === "%" || v === "()") return;
            targetInput += v;
        } else {
            if (cursorPos !== null) {
                historyExpr = historyExpr.slice(0, cursorPos) + v + historyExpr.slice(cursorPos);
                cursorPos += v.length;
            } else historyExpr += v;
            autoPreview();
        }
        render();
    }

    function calculate() {
        if (isTargetMode) { isTargetMode = false; render(); return; }
        try {
            let processed = preprocess(historyExpr);
            let finalRes = Math.round(eval(processed) * 1000000) / 1000000;
            
            // So sánh mục tiêu
            if (targetInput !== "") {
                let diff = finalRes - parseFloat(targetInput);
                if (Math.abs(diff) < 0.0001) {
                    msgDiv.innerText = "✅ KHỚP TUYỆT ĐỐI"; msgDiv.className = "led-blink-green";
                    playSound(1000, 'sine', 0.3);
                } else {
                    msgDiv.innerText = (diff > 0 ? "❌ VƯỢT: " : "❌ THIẾU: ") + formatNumber(Math.abs(diff).toFixed(2));
                    msgDiv.className = "led-blink-red";
                    vibrate([50, 50, 50]);
                }
            }
            
            // Lưu lịch sử
            calculationHistory.unshift({ expr: exprDiv.innerText, res: finalRes, raw: historyExpr });
            if (calculationHistory.length > 50) calculationHistory.pop();
            localStorage.setItem('clev_history', JSON.stringify(calculationHistory));

            resDiv.innerText = formatNumber(finalRes);
            historyExpr = finalRes.toString();
            isResultDisplayed = true; cursorPos = null;
            render();
        } catch(e) { resDiv.innerText = "Lỗi Định Dạng"; }
    }

    // --- VUỐT DI CHUYỂN CON TRỎ (Module riêng biệt) ---
    let startX = 0, startPos = 0;
    exprDiv.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        if (cursorPos === null) cursorPos = historyExpr.length;
        startPos = cursorPos;
        vibrate(10);
    });
    exprDiv.addEventListener('touchmove', e => {
        let delta = e.touches[0].clientX - startX;
        let move = Math.round(delta / 12);
        let newPos = Math.max(0, Math.min(historyExpr.length, startPos + move));
        if (newPos !== cursorPos) { cursorPos = newPos; render(); vibrate(5); }
    });

    // --- EVENTS ---
    document.querySelectorAll('[data-val]').forEach(b => {
        b.onclick = () => {
            let v = b.dataset.val;
            if (v === 'C') { historyExpr = ""; targetInput = ""; msgDiv.innerText = ""; resDiv.innerText = "0"; cursorPos = null; render(); }
            else if (v === '=') calculate();
            else if (v === '()') {
                let open = (historyExpr.match(/\(/g)||[]).length, close = (historyExpr.match(/\)/g)||[]).length;
                handleInput(open > close && !"+-*/(".includes(historyExpr.slice(-1)) ? ")" : "(");
            }
            else handleInput(v);
        };
    });

    document.getElementById('btn-backspace').onclick = () => {
        vibrate(10); playSound(600);
        if (isTargetMode) targetInput = targetInput.slice(0, -1);
        else {
            if (cursorPos !== null && cursorPos > 0) {
                historyExpr = historyExpr.slice(0, cursorPos - 1) + historyExpr.slice(cursorPos);
                cursorPos--;
            } else historyExpr = historyExpr.slice(0, -1);
            autoPreview();
        }
        render();
    };

    targetBox.onclick = () => { isTargetMode = !isTargetMode; vibrate(20); render(); };
    document.getElementById('theme-toggle').onclick = () => {
        let theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
        document.body.dataset.theme = theme; vibrate(30);
    };

    document.getElementById('openHistory').onclick = () => {
        hBox.style.display = 'flex';
        hList.innerHTML = calculationHistory.map((item, i) => `
            <div class="history-item" onclick="useHistory(${i})">
                <div class="history-expr">${item.expr} =</div>
                <div class="history-res">${formatNumber(item.res)}</div>
            </div>`).join('');
    };
    window.useHistory = i => {
        let item = calculationHistory[i];
        historyExpr = item.raw; cursorPos = historyExpr.length;
        hBox.style.display = 'none'; render(); autoPreview();
    };
    document.getElementById('closeHistory').onclick = () => hBox.style.display = 'none';
    document.getElementById('clearHistoryBtn').onclick = () => { calculationHistory = []; localStorage.removeItem('clev_history'); hList.innerHTML = ""; vibrate(100); };

    render();
</script>
</body>
</html>
