<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2344/2344132.png">
    <title> Sentinel </title>
    <style>
        :root {
            --bg-color: #ffffff; --screen-bg: #ffffff; --keypad-bg: #f1f2f6;
            --key-bg: #ffffff; --key-text: #2d3436; --key-active: #e2e4e9;
            --expr-text: #2d3436; --target-area-bg: #fffaf5; --target-border: #ffecdb;
            --accent: #27ae60; --op-color: #f39c12; --target-color: #e67e22;
            --danger: #c0392b; --led-green: #27ae60; --led-green-glow: 0 0 6px rgba(39, 174, 96, 0.2);
            --led-orange: #e67e22; --led-orange-glow: 0 0 8px rgba(230, 126, 34, 0.3);
            --led-red: #e74c3c; --led-red-glow: 0 0 10px rgba(231, 76, 60, 0.4);
        }
        [data-theme="dark"] {
            --bg-color: #000000; --screen-bg: #000000; --keypad-bg: #121212;
            --key-bg: #1e1e1e; --key-text: #ffffff; --key-active: #333333;
            --expr-text: #888888; --target-area-bg: #1a1510; --target-border: #3d2b1f;
            --led-green: #2ecc71; --led-green-glow: 0 0 12px rgba(46, 204, 113, 0.4);
            --led-orange: #f39c12; --led-orange-glow: 0 0 15px rgba(243, 156, 18, 0.5);
        }
        * {
            box-sizing: border-box; -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: manipulation; font-weight: 600; 
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
        }
        html, body {
            height: 100%; margin: 0; overflow: hidden;
            background-color: var(--bg-color); position: fixed; width: 100%;
        }
        .clevcalc-container {
            width: 100vw; height: 100dvh; max-width: 500px;
            background: var(--bg-color); display: flex; flex-direction: column;
            overflow: hidden; margin: 0 auto; position: relative;
        }
        /* TỐI ƯU: Tỷ lệ 60/40 */
        .display-screen {
            height: 40%; width: 100%;
            padding: 10px 20px 5px 20px;
            display: flex; flex-direction: column;
            justify-content: flex-end; text-align: right;
            background: var(--screen-bg); z-index: 5;
        }
        #expression {
            font-size: 1.6rem; line-height: 1.4; color: var(--expr-text);
            flex: 1; min-height: 0; max-height: none;
            overflow-y: auto; margin-bottom: 5px; font-weight: 500;
            word-wrap: break-word; overflow-wrap: break-word;
            white-space: pre-wrap; scrollbar-width: none;
            -webkit-user-select: text; user-select: text;
            /* TỐI ƯU: Hiển thị 5 dòng */
            display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical;
        }
        #expression::-webkit-scrollbar { display: none; }
        .expr-cursor {
            display: inline-block; width: 2.5px; height: 1.15em;
            background: var(--led-green); vertical-align: text-bottom;
            border-radius: 2px; animation: blink-cur 1s step-end infinite;
            box-shadow: var(--led-green-glow); margin: 0 1px; pointer-events: none;
        }
        @keyframes blink-cur { 50% { opacity: 0; } }
        #result-preview {
            font-size: clamp(2rem, 8vw, 2.5rem); color: var(--led-green);
            text-shadow: var(--led-green-glow); line-height: 1.1;
            overflow: hidden; white-space: nowrap; font-weight: 800;
            text-overflow: ellipsis; margin-bottom: 5px;
        }
        #comparison-msg { 
            font-size: 1.1rem; font-weight: 900; text-align: center; 
            min-height: 20px; margin-bottom: 8px; 
        }
        .target-area {
            display: flex; align-items: center; background: var(--target-area-bg);
            border-radius: 12px; padding: 8px 12px; border: 1px solid var(--target-border);
            gap: 8px; margin-bottom: 0;
        }
        .active-target { background: #fff5eb !important; border-color: var(--target-color) !important; outline: 2px solid var(--target-color); }
        [data-theme="dark"] .active-target { background: #2a1f15 !important; }
        /* TỐI ƯU: Keypad 40% */
        .keypad {
            height: 60%; width: 100%; display: grid;
            grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr);
            background: var(--keypad-bg); gap: 1px;
            padding-bottom: env(safe-area-inset-bottom);
        }
        button {
            background: var(--key-bg); border: none; font-size: 1.5rem; font-weight:900;
            color: var(--key-text); display: flex; justify-content: center;
            align-items: center; cursor: pointer; -webkit-user-drag: none;
            min-height: 44px; touch-action: manipulation; -webkit-tap-highlight-color: transparent;
            outline: none; user-select: none; -webkit-user-select: none;
            transition: background 0.05s ease;
        }
        button:active { background: var(--key-active); }
        button.touch-active { background: var(--key-active); transform: scale(0.98); }
        .btn-op { color: var(--op-color); font-weight: 900; }
        .btn-func { color: var(--accent); font-weight: 900; }
        .btn-clear { color: var(--danger); font-weight: 900; }
        .btn-equal { background: var(--accent); color: white; font-size: 2rem; font-weight: 800; }
        .btn-plus { grid-row: span 2; color: var(--op-color); font-weight: 900; }
        .control-btn { 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; padding: 4px; min-height: 40px; min-width: 40px; 
        }
        .control-btn svg { width: 20px; height: 20px; stroke-width: 2.5; fill: none; pointer-events: none; }
        #openHistory svg { stroke: var(--target-color); }
        #theme-toggle svg { fill: var(--target-color); }
        .btn-back-ctrl svg { stroke: var(--key-text); }
        .divider { width: 1px; height: 18px; background: var(--target-border); }
        .target-label { font-size: 0.65rem; color: var(--target-color); font-weight: 800; }
        #target-display { flex: 1; font-size: 1.2rem; color: var(--led-orange); text-shadow: var(--led-orange-glow); font-weight: 900; }
        .history-box {
            position: absolute; inset: 0; background: var(--screen-bg); z-index: 100;
            display: none; flex-direction: column; padding: 15px;
        }
        .history-list { flex: 1; overflow-y: auto; }
        .history-item { border-bottom: 1px solid var(--keypad-bg); padding: 12px 0; cursor: pointer; }
        .history-expr { color: var(--expr-text); font-size: 1.5rem; margin-bottom: 4px; opacity: 0.7; pointer-events: none; }
        .history-res { font-weight: 900; text-align: right; font-size: 1.8rem; color: var(--led-green); pointer-events: none; }
        .shake { animation: shake 0.4s both; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .neon-danger { color: var(--led-red) !important; text-shadow: var(--led-red-glow) !important; }
   /* LED blink cho các trạng thái */
@keyframes blink-led-green {
    0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent); }
    50% { opacity: 0.5; text-shadow: 0 0 5px var(--accent), 0 0 15px var(--accent); }
}

@keyframes blink-led-red {
    0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--danger), 0 0 20px var(--danger); }
    50% { opacity: 0.5; text-shadow: 0 0 5px var(--danger), 0 0 15px var(--danger); }
}

@keyframes blink-led-orange {
    0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--led-orange), 0 0 20px var(--led-orange); }
    50% { opacity: 0.5; text-shadow: 0 0 5px var(--led-orange), 0 0 15px var(--led-orange); }
}

.led-blink-green {
    animation: blink-led-green 1.2s ease-in-out infinite !important;
}

.led-blink-red {
    animation: blink-led-red 1.2s ease-in-out infinite !important;
}

.led-blink-orange {
    animation: blink-led-orange 1.2s ease-in-out infinite !important;
}
    </style>
</head>
<body oncontextmenu="return false;">

<div class="clevcalc-container">
    <div id="historyBox" class="history-box">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span style="font-size: 1.4rem; font-weight: 900; color: var(--accent);">Lịch sử</span>
            <div id="closeHistory" class="control-btn">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="color:var(--key-text)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
        </div>
        <div id="historyList" class="history-list"></div>
        <button id="clearHistoryBtn" style="margin-top: 12px; min-height: 48px; background: var(--keypad-bg); font-size: 0.95rem; border-radius: 10px; color: var(--danger); width:100%">Xóa tất cả lịch sử</button>
    </div>

    <div class="display-screen">
        <div id="expression"></div>
        <div id="result-preview">0</div>
        <div id="comparison-msg"></div>
        <div class="target-area" id="target-area-container">
            <div class="control-btn" id="openHistory">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            </div>
            <div class="divider"></div>
            <div class="control-btn" id="theme-toggle">
                <svg id="theme-icon" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
            </div>
            <div class="divider"></div>
            <div id="target-box" style="display:flex; align-items:center; flex:1; height:100%; cursor:pointer;">
                <span class="target-label">MỤC TIÊU:</span>
                <div id="target-display">0</div>
            </div>
            <div class="control-btn btn-back-ctrl" id="btn-backspace">
                <svg viewBox="0 0 24 24"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
            </div>
        </div>
    </div>

    <div class="keypad">
        <button class="btn-clear" data-val="C">C</button>
        <button class="btn-func" data-val="()">()</button>
        <button class="btn-func" data-val="%">%</button>
        <button class="btn-op" data-val="*">×</button>
        <button data-val="7">7</button>
        <button data-val="8">8</button>
        <button data-val="9">9</button>
        <button class="btn-op" data-val="-">−</button>
        <button data-val="4">4</button>
        <button data-val="5">5</button>
        <button data-val="6">6</button>
        <button class="btn-op btn-plus" data-val="+">+</button>
        <button data-val="1">1</button>
        <button data-val="2">2</button>
        <button data-val="3">3</button>
        <button data-val="0">0</button>
        <button data-val="00">00</button>
        <button data-val=".">,</button>
        <button class="btn-equal" data-val="=">=</button>
    </div>
</div>

<script>
    let audioCtx;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}

    let historyExpr = ""; 
    let targetInput = "";
    let isTargetMode = false;
    let calculationHistory = JSON.parse(localStorage.getItem('calc_history') || '[]');
    let cursorPos = null; 
    let isResultDisplayed = false;

    const exprDiv = document.getElementById('expression'), 
          resDiv = document.getElementById('result-preview'), 
          targetDiv = document.getElementById('target-display'), 
          targetBox = document.getElementById('target-box'), 
          msgDiv = document.getElementById('comparison-msg'), 
          hBox = document.getElementById('historyBox'), 
          hList = document.getElementById('historyList');

    function playSound(type) {
        if (!audioCtx) return;
        try {
            if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'success') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1046.5, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'fail') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        } catch(e) {}
    }
    
    function vibrate() { if (navigator.vibrate) navigator.vibrate(10); }

    function formatNumber(val) {
        if (!val && val !== 0) return "";
        let s = val.toString().split('.');
        s[0] = s[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        return s.length > 1 ? s[0] + "," + s[1] : s[0];
    }

    // TỐI ƯU: Xử lý touch
    function handleButtonPress(e, btn) {
        e.preventDefault();
        e.stopPropagation();
        btn.classList.add('touch-active');
        vibrate(); 
        const v = btn.getAttribute('data-val');
        if (v === 'C') clearAll();
        else if (v === '()') smartParenthesis();
        else if (v === '%') applyPercent();
        else if (['+','-','*'].includes(v)) addOp(v);
        else if (v === '=') calculate();
        else handleInput(v);
        setTimeout(() => btn.classList.remove('touch-active'), 100);
    }

    document.querySelectorAll('[data-val]').forEach(btn => {
        btn.removeEventListener('touchstart', btn._handler);
        btn._handler = (e) => handleButtonPress(e, btn);
        btn.addEventListener('touchstart', btn._handler, { passive: false });
        btn.addEventListener('mousedown', (e) => handleButtonPress(e, btn));
    });

    function handleInput(n) {
        playSound('click');
        if (isResultDisplayed && !isTargetMode) {
            historyExpr = ""; isResultDisplayed = false; cursorPos = null;
        }

        if (isTargetMode) {
            if (n === '.' && targetInput.includes('.')) return;
            targetInput += n;
        } else {
            if (cursorPos !== null) {
                historyExpr = historyExpr.slice(0, cursorPos) + n + historyExpr.slice(cursorPos);
                cursorPos += n.length;
            } else {
                if (targetInput !== "" && !isNaN(n)) {
                    let cleanedExpr = historyExpr + n;
                    while (['+','-','*','/','(','.'].includes(cleanedExpr.slice(-1))) cleanedExpr = cleanedExpr.slice(0, -1);
                    try {
                        let open = (cleanedExpr.match(/\(/g) ||[]).length, close = (cleanedExpr.match(/\)/g) ||[]).length;
                        if (open > close) cleanedExpr += ")".repeat(open - close);
                        let potential = Math.round(eval(cleanedExpr) * 1000000) / 1000000;
                        if (potential > parseFloat(targetInput)) {
                            msgDiv.innerText = "⚠️ SẼ VƯỢT MỤC TIÊU!"; msgDiv.style.color = "var(--danger)";
                            msgDiv.classList.add('shake'); setTimeout(() => msgDiv.classList.remove('shake'), 400);
                            resDiv.classList.add('neon-danger'); playSound('fail');
                        }
                    } catch(e) {}
                }
                historyExpr += n;
            }
            autoPreview();
        }
        renderDisplay();
    }

    function addOp(op) {
        playSound('click'); isResultDisplayed = false;
        if (isTargetMode) isTargetMode = false;

        if (cursorPos !== null) {
            const charBefore = cursorPos > 0 ? historyExpr[cursorPos - 1] : '';
            if (['+','-','*','/'].includes(charBefore)) {
                historyExpr = historyExpr.slice(0, cursorPos - 1) + op + historyExpr.slice(cursorPos);
            } else {
                historyExpr = historyExpr.slice(0, cursorPos) + op + historyExpr.slice(cursorPos);
                cursorPos++;
            }
        } else {
            const last = historyExpr.slice(-1);
            if (['+','-','*','/'].includes(last)) historyExpr = historyExpr.slice(0, -1) + op;
            else if (historyExpr !== "" || op === '-') historyExpr += op;
        }
        renderDisplay(); autoPreview();
    }

    function applyPercent() {
        if (isTargetMode) return;
        playSound('click'); cursorPos = null;
        try {
            let parts = historyExpr.split(/([\+\-\*\/])/), lastPart = parts.pop(), op = parts.pop();
            let base = eval(parts.join("") || "0");
            let val = (op === '+' || op === '-') ? base * (parseFloat(lastPart) / 100) : parseFloat(lastPart) / 100;
            historyExpr = parts.join("") + (op || "") + val;
            renderDisplay(); autoPreview();
        } catch(e) {}
    }

    let backTimer, backInterval;
    const btnBack = document.getElementById('btn-backspace');
    function backspace() {
        if (isTargetMode) targetInput = targetInput.slice(0, -1);
        else {
            if (cursorPos !== null) {
                if (cursorPos > 0) {
                    historyExpr = historyExpr.slice(0, cursorPos - 1) + historyExpr.slice(cursorPos);
                    cursorPos--;
                }
            } else historyExpr = historyExpr.slice(0, -1);
            autoPreview();
        }
        renderDisplay();
    }

    btnBack.addEventListener('touchstart', (e) => {
        e.preventDefault();
        vibrate(); playSound('click'); backspace();
        backTimer = setTimeout(() => { 
            backInterval = setInterval(() => { 
                vibrate(); backspace(); 
            }, 70); 
        }, 500);
    }, { passive: false });
    
    const stopBack = () => { 
        clearTimeout(backTimer); 
        clearInterval(backInterval); 
    };
    btnBack.addEventListener('touchend', stopBack, { passive: false });
    btnBack.addEventListener('touchcancel', stopBack, { passive: false });
    btnBack.addEventListener('touchmove', stopBack, { passive: false });

    function calculate() {
    // Xóa tất cả hiệu ứng LED cũ
    msgDiv.classList.remove('led-blink-green', 'led-blink-red', 'led-blink-orange');
    
    if (isTargetMode) { isTargetMode = false; renderDisplay(); return; }
    let raw = historyExpr; if (!raw) return;
    cursorPos = null;
    try {
        while (['+','-','*','/','(','.'].includes(raw.slice(-1))) raw = raw.slice(0, -1);
        let res = eval(raw); 
        let finalRes = Math.round(res * 1000000) / 1000000;

        if (targetInput !== "") {
            if (Math.abs(finalRes - parseFloat(targetInput)) < 0.00001) {
                msgDiv.innerText = "✅ KHỚP TUYỆT ĐỐI"; 
                msgDiv.style.color = "var(--accent)";
                msgDiv.classList.add('led-blink-green'); // Nhấp nháy xanh
                playSound('success');
            } else {
                let diff = Math.round((finalRes - parseFloat(targetInput)) * 100) / 100;
                if (diff > 0) {
                    msgDiv.innerText = "❌ VƯỢT: " + formatNumber(Math.abs(diff));
                    msgDiv.classList.add('led-blink-red'); // Nhấp nháy đỏ
                } else {
                    msgDiv.innerText = "❌ THIẾU: " + formatNumber(Math.abs(diff));
                    msgDiv.classList.add('led-blink-orange'); // Nhấp nháy cam
                }
                msgDiv.style.color = "var(--danger)";
                playSound('fail');
            }
        }
        } catch(e) { resDiv.innerText = "Lỗi"; }
        renderDisplay();
    }

    function autoPreview() {
        try {
            let temp = historyExpr; if (!temp) { resDiv.innerText = "0"; return; }
            while (['+','-','*','/','(','.'].includes(temp.slice(-1))) temp = temp.slice(0, -1);
            let open = (temp.match(/\(/g) ||[]).length, close = (temp.match(/\)/g) ||[]).length;
            if (open > close) temp += ")".repeat(open - close);
            
            let pVal = Math.round(eval(temp) * 1000000) / 1000000;
            resDiv.innerText = formatNumber(pVal);
            
            if (targetInput !== "" && pVal > parseFloat(targetInput)) {
                resDiv.classList.add('neon-danger'); msgDiv.innerText = "⚠️ VƯỢT QUÁ!"; msgDiv.style.color = "var(--danger)";
            } else { resDiv.classList.remove('neon-danger'); if (!isTargetMode) msgDiv.innerText = ""; }
        } catch(e) {}
    }

    function renderDisplay() {
    // Xóa hiệu ứng LED khi không còn thông báo
    if (msgDiv.innerText === "" || !msgDiv.innerText.includes("KHỚP") && !msgDiv.innerText.includes("VƯỢT") && !msgDiv.innerText.includes("THIẾU")) {
        msgDiv.classList.remove('led-blink-green', 'led-blink-red', 'led-blink-orange');
    }
        if (isTargetMode) {
            document.getElementById('target-area-container').classList.add('active-target');
        } else {
            document.getElementById('target-area-container').classList.remove('active-target');
            if (cursorPos !== null) {
                const fmt = s => {
                    let str = s.replace(/\*/g,' × ').replace(/\//g,' ÷ ').replace(/\+/g,' + ').replace(/\-/g,' − ');
                    return str.replace(/(\d+(\.\d+)?)/g, match => formatNumber(match));
                };
                const pre = fmt(historyExpr.slice(0, cursorPos));
                const post = fmt(historyExpr.slice(cursorPos));
                exprDiv.innerHTML = pre + '<span class="expr-cursor"></span>' + post;
            } else {
                let displayStr = historyExpr.replace(/\*/g,' × ').replace(/\//g,' ÷ ').replace(/\+/g,' + ').replace(/\-/g,' − ');
                displayStr = displayStr.replace(/(\d+(\.\d+)?)/g, match => formatNumber(match));
                exprDiv.innerHTML = displayStr;
            }
        }
        targetDiv.innerText = formatNumber(targetInput) || "0";
        exprDiv.scrollTop = exprDiv.scrollHeight;
    }

    exprDiv.addEventListener('touchstart', function(e) {
        if (historyExpr === "" || isTargetMode) return;
        const touch = e.touches[0];
        if (cursorPos === null) cursorPos = historyExpr.length;
        renderDisplay();

        setTimeout(() => {
            let range, textNode, offset;
            if (document.caretRangeFromPoint) {
                range = document.caretRangeFromPoint(touch.clientX, touch.clientY);
            } else if (e.target.ownerDocument.caretPositionFromPoint) {
                const pos = e.target.ownerDocument.caretPositionFromPoint(touch.clientX, touch.clientY);
                if (pos) { textNode = pos.offsetNode; offset = pos.offset; }
            }
            if (range) { textNode = range.startContainer; offset = range.startOffset; }

            if (textNode) {
                let totalOffset = 0; let found = false;
                for (let node of exprDiv.childNodes) {
                    if (node === textNode) { totalOffset += offset; found = true; break; }
                    if (node.nodeType === 3) {
                        totalOffset += node.textContent.length;
                    } else if (node.nodeType === 1 && node.className !== 'expr-cursor') {
                        totalOffset += node.innerText.length;
                    }
                }
                
                if (found) { 
                    let visualText = exprDiv.innerText;
                    let visualPrefix = visualText.substring(0, totalOffset);
                    let rawPrefixLength = 0;
                    for(let i = 0; i < visualPrefix.length; i++) {
                        let char = visualPrefix[i];
                        if (char.match(/[0-9\(\)]/) ||['×','÷','+','−', ','].includes(char)) {
                            rawPrefixLength++;
                        }
                    }
                    cursorPos = Math.min(rawPrefixLength, historyExpr.length);
                    renderDisplay(); 
                }
            }
        }, 10);
        vibrate();
    }, {passive: false});

    function renderHistory() {
        hList.innerHTML = calculationHistory.map((item, i) => `
            <div class="history-item" onclick="loadEditHistory(${i})">
                <div class="history-expr">${item.expr} =</div>
                <div class="history-res">${formatNumber(item.res)}</div>
            </div>
        `).reverse().join('');
    }

    window.loadEditHistory = (i) => {
        const item = calculationHistory[i];
        historyExpr = item.raw || item.expr.replace(/ × /g,'*').replace(/ ÷ /g,'/').replace(/ − /g,'-').replace(/\./g,'').replace(/,/g,'.');
        cursorPos = historyExpr.length;
        isResultDisplayed = false;
        hBox.style.display = 'none';
        playSound('click'); renderDisplay(); autoPreview();
    };

    function clearAll() {
        // Xóa tất cả hiệu ứng LED
    msgDiv.classList.remove('led-blink-green', 'led-blink-red', 'led-blink-orange');
    
   
        playSound('click');
        if (isTargetMode) targetInput = "";
        else { historyExpr = ""; targetInput = ""; msgDiv.innerText = ""; cursorPos = null; isResultDisplayed = false; }
        resDiv.innerText = "0"; resDiv.classList.remove('neon-danger'); renderDisplay();
    }

    function smartParenthesis() {
        playSound('click');
        let open = (historyExpr.match(/\(/g) ||[]).length, close = (historyExpr.match(/\)/g) ||[]).length;
        let char = (open > close && !['+','-','*','/','('].includes(historyExpr.slice(-1))) ? ")" : "(";
        if (cursorPos !== null) {
            historyExpr = historyExpr.slice(0, cursorPos) + char + historyExpr.slice(cursorPos); cursorPos++;
        } else { historyExpr += char; }
        renderDisplay();
    }

    document.getElementById('theme-toggle').onclick = () => {
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('theme-icon').innerHTML = isDark ? 
            '<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>' :
            '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
        vibrate(); playSound('click');
    };

    document.getElementById('openHistory').onclick = () => { hBox.style.display = 'flex'; renderHistory(); vibrate(); };
    document.getElementById('closeHistory').onclick = () => { hBox.style.display = 'none'; vibrate(); };
    document.getElementById('clearHistoryBtn').onclick = () => { calculationHistory = []; renderHistory(); vibrate(); };
    targetBox.onclick = () => { isTargetMode = !isTargetMode; renderDisplay(); vibrate(); };

    document.querySelector('.keypad').addEventListener('touchstart', (e) => {
        e.preventDefault();
    }, { passive: false });

</script>
